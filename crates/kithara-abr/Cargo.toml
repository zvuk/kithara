[package]
name = "kithara-abr"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Protocol-agnostic adaptive bitrate algorithm for audio streaming"

[dependencies]
derivative = { workspace = true }
derive_setters = { workspace = true }
kithara-events = { workspace = true }
kithara-platform = { workspace = true }
kithara-probes = { workspace = true }
num-traits = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
unimock = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[features]
internal = ["dep:unimock"]
# Emit `tracing::event!` from `#[kithara::probe]` sites so observers
# (e.g. `probe_capture` in tests) can pick them up. No USDT integration —
# the macro expansion stays unsafe-free, preserving `#![forbid(unsafe_code)]`.
# This crate intentionally does NOT expose a `usdt-probes` feature
# because `usdt::provider!` emits inline asm that requires `unsafe`.
tracing-probes = ["kithara-probes/tracing-probes"]

[dev-dependencies]
kithara-abr = { path = ".", default-features = false, features = ["internal"] }
unimock = { workspace = true }
kithara-test-utils = { workspace = true }
wasm-bindgen-test = { workspace = true }
proptest = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[lints]
workspace = true

[package]
name = "kithara-abr"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Protocol-agnostic adaptive bitrate algorithm for audio streaming"

[dependencies]
derivative = { workspace = true }
kithara-platform = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[features]
internal = []

[dev-dependencies]
kithara-abr = { path = ".", default-features = false, features = ["internal"] }
unimock = { workspace = true }
kithara-test-utils = { workspace = true }
wasm-bindgen-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }

[lints]
workspace = true

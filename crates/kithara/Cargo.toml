[package]
name = "kithara"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Cross-platform streaming audio player: HLS + progressive, gapless, DJ-grade mixing. An AVPlayer-class engine in Rust."
keywords = ["audio", "streaming", "hls", "player", "dj"]
categories = ["multimedia::audio"]

[lints]
workspace = true

[dependencies]
kithara-audio = { workspace = true }
kithara-decode = { workspace = true }
kithara-events = { workspace = true }
kithara-platform = { workspace = true }
kithara-play = { workspace = true, default-features = false, features = ["backend-cpal"] }
kithara-stream = { workspace = true }
kithara-file = { workspace = true, optional = true }
kithara-hls = { workspace = true, optional = true }
kithara-assets = { workspace = true, optional = true }
kithara-storage = { workspace = true, optional = true }
kithara-net = { workspace = true, optional = true }
kithara-abr = { workspace = true, optional = true }
kithara-bufpool = { workspace = true }
kithara-drm = { workspace = true, optional = true }
kithara-test-macros = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha2", path = "../kithara-workspace-hack" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
kithara-play = { workspace = true, default-features = false, features = ["backend-cpal", "wasm-bindgen"] }

[features]
default = ["file", "hls", "symphonia"]
# Enable the Symphonia software decoder path. Disable to compile with
# only a hardware backend (apple/android) and no software fallback.
symphonia = ["kithara-audio/symphonia", "kithara-decode/symphonia"]
# libfdk-aac override for HE-AAC v1/v2 streams. Symphonia ships an
# LC-only AAC decoder; without this feature, HE-AAC v2 (parametric
# stereo + SBR) streams fail in the software pipeline.
fdk-aac = ["kithara-audio/fdk-aac", "kithara-decode/fdk-aac"]
file = ["dep:kithara-file", "dep:kithara-assets", "dep:kithara-net"]
hls = ["dep:kithara-hls", "dep:kithara-abr", "dep:kithara-assets", "dep:kithara-net", "dep:kithara-drm"]
assets = ["dep:kithara-assets", "dep:kithara-storage"]
net = ["dep:kithara-net"]
bufpool = []
probe = [
    "kithara-audio/probe",
    "kithara-decode/probe",
    "kithara-stream/probe",
    "kithara-play/probe",
]
mock = [
    "kithara-audio/mock",
    "kithara-decode/mock",
    "kithara-stream/mock",
    "kithara-play/mock",
]
perf = [
    "kithara-audio/perf",
    "kithara-decode/perf",
    "kithara-storage/perf",
    "kithara-stream/perf",
    "kithara-bufpool/perf",
    "kithara-file/perf",
    "kithara-hls/perf",
    "kithara-net/perf",
]
# Apple HW backend. Does NOT include `fdk-aac` — Apple AudioToolbox
# decodes HE-AAC v1/v2 natively via kAudioFormatMPEG4AAC_HE / _HE_V2
# (see crates/kithara-decode/src/apple/codec.rs). fdk-aac stays
# coupled to symphonia for desktop/WASM software fallback builds only.
apple = ["kithara-audio/apple", "kithara-play/apple"]
android = ["kithara-audio/android", "kithara-decode/android"]
full = ["file", "hls", "assets", "net", "bufpool"]

[dev-dependencies]
kithara = { path = ".", default-features = false }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }


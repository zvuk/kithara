[package]
name = "kithara"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Facade crate for audio streaming with auto-detection (file / HLS)"

[lints]
workspace = true

[dependencies]
kithara-audio = { workspace = true }
kithara-decode = { workspace = true }
kithara-events = { workspace = true }
kithara-platform = { workspace = true }
kithara-play = { workspace = true, default-features = false, features = ["backend-cpal"] }
kithara-stream = { workspace = true }
kithara-file = { workspace = true, optional = true }
kithara-hls = { workspace = true, optional = true }
kithara-assets = { workspace = true, optional = true }
kithara-storage = { workspace = true, optional = true }
kithara-net = { workspace = true, optional = true }
kithara-abr = { workspace = true, optional = true }
kithara-bufpool = { workspace = true }
kithara-drm = { workspace = true, optional = true }
kithara-test-macros = { workspace = true, optional = true }
rodio = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
kithara-play = { workspace = true, default-features = false, features = ["backend-cpal", "wasm-bindgen"] }

[features]
default = ["file", "hls"]
file = ["dep:kithara-file", "dep:kithara-assets", "dep:kithara-net", "kithara-play/file"]
hls = ["dep:kithara-hls", "dep:kithara-abr", "dep:kithara-assets", "dep:kithara-net", "dep:kithara-drm", "kithara-play/hls"]
assets = ["dep:kithara-assets", "dep:kithara-storage"]
net = ["dep:kithara-net"]
bufpool = []
test-utils = [
    "dep:kithara-test-macros",
    "kithara-audio/test-utils",
    "kithara-decode/test-utils",
    "kithara-stream/test-utils",
    "kithara-play/test-utils",
]
rodio = ["dep:rodio", "rodio/playback", "rodio/mp3", "rodio/mp4", "rodio/flac", "rodio/vorbis", "rodio/wav", "kithara-audio/rodio", "kithara-play/rodio"]
perf = [
    "kithara-audio/perf",
    "kithara-decode/perf",
    "kithara-storage/perf",
    "kithara-stream/perf",
    "kithara-bufpool/perf",
    "kithara-file/perf",
    "kithara-hls/perf",
    "kithara-net/perf",
]
disable-hang-detector = [
    "kithara-audio/disable-hang-detector",
    "kithara-hls?/disable-hang-detector",
]
apple = ["kithara-audio/apple", "kithara-play/apple"]
full = ["file", "hls", "assets", "net", "bufpool"]
internal = [
    "kithara-assets?/internal",
    "kithara-hls?/internal",
    "kithara-net?/internal",
]

[dev-dependencies]
kithara = { path = ".", default-features = false, features = ["internal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
rodio = { workspace = true, features = ["playback"] }

[package.metadata.cargo-machete]
ignored = ["rodio"]


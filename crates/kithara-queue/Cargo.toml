[package]
name = "kithara-queue"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "AVQueuePlayer-analogue orchestration on top of kithara-play (queue, loader, navigation, crossfade-aware select)"

[lints]
workspace = true

[features]
default = ["backend-cpal"]
backend-cpal = ["kithara-play/backend-cpal"]
backend-web-audio = ["kithara-play/backend-web-audio"]
# Exposes test-only helpers (`Queue::insert_loaded_for_test`) for
# integration tests that drive Queue against an offline backend.
probe = ["kithara-play/probe"]

[dependencies]
kithara-play = { workspace = true }
kithara-abr = { workspace = true }
kithara-events = { workspace = true }

tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
bon = { workspace = true }
delegate = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[dev-dependencies]
kithara-platform = { workspace = true }
kithara-test-utils = { workspace = true, features = ["mock", "probe", "test"] }
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }

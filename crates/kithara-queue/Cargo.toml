[package]
name = "kithara-queue"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Queue/playlist orchestration: gapless, crossfade-aware."
keywords = ["audio", "player", "playlist", "gapless", "dj"]
categories = ["multimedia::audio"]

[features]
default = ["backend-cpal", "symphonia", "client-reqwest", "tls-rustls"]
backend-cpal = ["kithara-play/backend-cpal"]
# HTTP backend forwarding to every kithara-net-reaching dep.
client-reqwest = ["kithara-play/client-reqwest", "kithara-abr/client-reqwest", "kithara-events/client-reqwest"]
client-wreq = ["kithara-play/client-wreq", "kithara-abr/client-wreq", "kithara-events/client-wreq"]
tls-rustls = ["kithara-play/tls-rustls", "kithara-abr/tls-rustls", "kithara-events/tls-rustls"]
tls-native = ["kithara-play/tls-native", "kithara-abr/tls-native", "kithara-events/tls-native"]
backend-web-audio = ["kithara-play/backend-web-audio", "kithara-play/wasm-bindgen"]
# Software decoder pass-through (see kithara-play). Required unless an
# explicit hardware backend feature is enabled.
symphonia = ["kithara-play/symphonia"]
webcodecs = ["kithara-play/webcodecs"]
fdk-aac = ["kithara-play/fdk-aac"]
apple = ["kithara-play/apple"]
apple-fused-src = ["kithara-play/apple-fused-src"]
# Exposes test-only helpers (`Queue::insert_loaded_for_test`) for
# integration tests that drive Queue against an offline backend.
probe = ["kithara-play/probe"]

[dependencies]
kithara-abr = { workspace = true, default-features = false }
kithara-assets = { workspace = true, default-features = false }
kithara-bufpool = { workspace = true }
kithara-events = { workspace = true }
kithara-platform = { workspace = true }
kithara-play = { workspace = true, default-features = false }

bon = { workspace = true }
delegate = { workspace = true }
derive_more = { workspace = true }
fieldwork = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha4", path = "../kithara-workspace-hack" }

[dev-dependencies]
kithara-platform = { workspace = true }
kithara-test-utils = { path = "../kithara-test-utils", features = ["mock", "probe", "hang"] }

[lints]
workspace = true

[package]
name = "kithara-events"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified event bus for kithara audio pipeline"

[lints]
workspace = true

[dependencies]
dashmap = { workspace = true }
delegate = { workspace = true }
derivative = { workspace = true }
kithara-platform = { workspace = true }
portable-atomic = { workspace = true }
smallvec = { workspace = true }

kithara-abr = { workspace = true, optional = true }
kithara-decode = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[features]
default = ["file", "hls", "audio", "player", "app"]
app = []
file = []
hls = ["dep:kithara-abr"]
audio = ["dep:kithara-decode"]
player = []
internal = []

[dev-dependencies]
kithara-events = { path = ".", default-features = false, features = ["internal"] }
kithara-test-utils = { workspace = true }
wasm-bindgen-test = { workspace = true }


[package]
name = "kithara-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "mmap-backed storage resource with random-access I/O."
keywords = ["storage", "mmap", "cache", "audio", "io"]
categories = ["caching"]

[lints]
workspace = true

[features]
default = []
probe = []
mock = []
perf = ["dep:hotpath", "hotpath/hotpath"]

[dependencies]
bon = { workspace = true }
delegate = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
kithara-bufpool = { workspace = true }
kithara-test-macros = { workspace = true }
kithara-test-utils = { workspace = true }

# range tracking + sync primitives (wasm32-compatible)
rangemap = { workspace = true }
kithara-platform = { workspace = true }
crossbeam-queue = { workspace = true }

unimock = { workspace = true }
hotpath = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha2", path = "../kithara-workspace-hack" }
# mmap backend (not available on wasm32)
mmap-io = { workspace = true }
# crash-safe atomic writes (unique temp files)
tempfile = { workspace = true }
# full tokio features for native
tokio-util = { workspace = true, features = ["full"] }

[dev-dependencies]
kithara-storage = { path = ".", default-features = false }
kithara-test-utils = { path = "../kithara-test-utils", features = ["mock", "probe"] }
tempfile = { workspace = true }
wasm-bindgen-test = { workspace = true }

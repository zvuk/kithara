[package]
name = "kithara-storage"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified storage resource backed by mmap with random-access I/O"

[lints]
workspace = true

[features]
default = []
test-utils = ["unimock"]
perf = ["dep:hotpath", "hotpath/hotpath"]
internal = []
disable-hang-detector = [
    "kithara-hang-detector/disable-hang-detector",
    "kithara-platform/disable-hang-detector",
]

[dependencies]
delegate = { workspace = true }
derivative = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
kithara-bufpool = { workspace = true }

# range tracking + sync primitives (wasm32-compatible)
rangemap = { workspace = true }
kithara-hang-detector = { workspace = true }
kithara-platform = { workspace = true }
crossbeam-queue = { workspace = true }

# mock support (optional)
unimock = { workspace = true, optional = true }
hotpath = { workspace = true, optional = true }
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# mmap backend (not available on wasm32)
mmap-io = { workspace = true }
# crash-safe atomic writes (unique temp files)
tempfile = { workspace = true }
# full tokio features for native
tokio-util = { workspace = true, features = ["full"] }

[dev-dependencies]
kithara-storage = { path = ".", default-features = false, features = ["internal"] }
kithara-test-macros = { workspace = true }
tempfile = { workspace = true }
unimock = { workspace = true }
wasm-bindgen-test = { workspace = true }

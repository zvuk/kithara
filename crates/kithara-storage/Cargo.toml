[package]
name = "kithara-storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "mmap-backed storage resource with random-access I/O."
keywords = ["storage", "mmap", "cache", "audio", "io"]
categories = ["caching"]

[features]
default = ["client-reqwest", "tls-rustls"]
probe = []
mock = []
perf = ["dep:hotpath", "hotpath/hotpath"]
# HTTP backend forwarding. kithara-storage reaches the single kithara-net
# package only through kithara-test-utils -> kithara-events (downloader event
# types). These forwards give kithara-net a backend in standalone builds of
# this crate; workspace-level default-features = false keeps the default off
# when kithara-storage is a transitive dep (so apple/android stay wreq-only).
client-reqwest = ["kithara-test-utils/client-reqwest"]
client-wreq = ["kithara-test-utils/client-wreq"]
tls-rustls = ["kithara-test-utils/tls-rustls"]
tls-native = ["kithara-test-utils/tls-native"]

[dependencies]
kithara-bufpool = { workspace = true }
kithara-platform = { workspace = true }
kithara-test-macros = { workspace = true }
kithara-test-utils = { workspace = true }

# range tracking + sync primitives (wasm32-compatible)
arc-swap = { workspace = true }

bon = { workspace = true }
crossbeam-queue = { workspace = true }
delegate = { workspace = true }

hotpath = { workspace = true, optional = true }
rangemap = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
unimock = { workspace = true }

[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "android")))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha4", path = "../kithara-workspace-hack" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# mmap backend (not available on wasm32)
mmap-io = { workspace = true }
# crash-safe atomic writes (unique temp files)
tempfile = { workspace = true }

[dev-dependencies]
kithara-storage = { path = ".", default-features = false }
kithara-test-utils = { path = "../kithara-test-utils", features = ["mock", "probe", "hang"] }
tempfile = { workspace = true }
wasm-bindgen-test = { workspace = true }

[lints]
workspace = true

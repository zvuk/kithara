[package]
name = "kithara-hls"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "HLS VOD orchestration with ABR, segment caching, and offline support"

[lints]
workspace = true

[dependencies]
kithara-abr = { workspace = true }
kithara-assets = { workspace = true }
kithara-bufpool = { workspace = true }
kithara-events = { workspace = true, features = ["hls"] }
kithara-drm = { workspace = true }
kithara-net = { workspace = true }
kithara-stream = { workspace = true }
kithara-storage = { workspace = true }
bytes = { workspace = true }
derivative = { workspace = true }
derive_setters = { workspace = true }
futures = { workspace = true }
hls_m3u8 = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
url = { workspace = true }
tracing = { workspace = true }
kithara-platform = { workspace = true }
crossbeam-queue = { workspace = true }
rangemap = { workspace = true }
hotpath = { workspace = true, optional = true }

[features]
default = []
perf = ["dep:hotpath", "hotpath/hotpath", "kithara-net/perf"]
internal = []
disable-hang-detector = ["kithara-platform/disable-hang-detector"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio-util = { workspace = true, features = ["full"] }

[dev-dependencies]
kithara-hls = { path = ".", default-features = false, features = ["internal"] }
kithara-net = { workspace = true, features = ["test-utils"] }
tempfile = { workspace = true }
kithara-test-utils = { workspace = true }
wasm-bindgen-test = { workspace = true }
unimock = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
axum = { workspace = true }
rodio = { workspace = true, features = ["playback"] }
tracing-subscriber = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["hotpath"]

[package]
name = "kithara-hls"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "HLS VOD orchestration with ABR, segment caching, and offline support"

[lints]
workspace = true

[dependencies]
kithara-abr = { workspace = true }
kithara-assets = { workspace = true }
kithara-bufpool = { workspace = true }
kithara-events = { workspace = true, features = ["hls"] }
kithara-drm = { workspace = true }
kithara-net = { workspace = true }
kithara-stream = { workspace = true }
kithara-storage = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }
derivative = { workspace = true }
derive_setters = { workspace = true }
futures = { workspace = true }
hls_m3u8 = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
url = { workspace = true }
tracing = { workspace = true }
kithara-hang-detector = { workspace = true }
kithara-platform = { workspace = true }
kithara-probes = { workspace = true }
rangemap = { workspace = true }
re_mp4 = { workspace = true }
hotpath = { workspace = true, optional = true }

[features]
default = []
perf = ["dep:hotpath", "hotpath/hotpath", "kithara-net/perf"]
internal = ["kithara-abr/internal"]
# USDT probes for HLS scheduler decisions (seek demand, epoch reset,
# FetchCmd emit, read_at, queue_segment_request). Disabled by default —
# release builds compile probes to no-ops.
#
# `dep:usdt` is required because `#[kithara::probe]` expansion
# references `::usdt::provider!` directly from the consumer crate.
usdt-probes = ["dep:usdt", "kithara-probes/usdt-probes"]
disable-hang-detector = [
    "kithara-hang-detector/disable-hang-detector",
    "kithara-platform/disable-hang-detector",
]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }
tokio-util = { workspace = true, features = ["full"] }
usdt = { workspace = true, optional = true }

[dev-dependencies]
aes = { workspace = true }
cbc = { workspace = true }
kithara-abr = { workspace = true, features = ["internal"] }
kithara-hls = { path = ".", default-features = false, features = ["internal", "usdt-probes"] }
kithara-net = { workspace = true, features = ["test-utils"] }
tempfile = { workspace = true }
kithara-test-utils = { workspace = true }
serial_test = { workspace = true }
wasm-bindgen-test = { workspace = true }
unimock = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
axum = { workspace = true }
tracing-subscriber = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["hotpath"]

[package]
name = "kithara-test-macros"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "kithara macros: #[kithara::test/probe/mock] for native + WASM (no-op in release)."
keywords = ["audio", "testing", "macros", "kithara"]
categories = ["development-tools::testing"]

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["extra-traits"] }
quote = { workspace = true }
proc-macro2 = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha2", path = "../kithara-workspace-hack" }

[lints]
workspace = true

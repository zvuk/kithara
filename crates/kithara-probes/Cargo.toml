[package]
name = "kithara-probes"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Runtime support for #[kithara::probe] — IntoProbeArg trait + USDT registration"

[lints]
workspace = true

[dependencies]
kithara-probe-macros = { workspace = true }
kithara-events = { workspace = true, features = ["downloader"] }
tracing = { workspace = true }
url = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }
usdt = { workspace = true, optional = true }

[features]
# Activates USDT probe registration. Probe-attributed functions in the
# *consumer* crate gate their USDT/tracing emission on the consumer's
# own `usdt-probes` feature; this flag only enables the runtime
# `register_probes()` helper.
#
# Implies `tracing-probes` — USDT consumers want tracing emission too.
usdt-probes = ["dep:usdt", "tracing-probes"]
# Activates the `tracing::event!` arm of `#[kithara::probe]` without
# pulling in `usdt`. Use this in crates that keep `#![forbid(unsafe_code)]`
# (e.g. `kithara-abr`) — the macro expansion contains no inline asm and
# stays unsafe-free. Test harnesses that observe probes through
# `probe_capture` only need this feature; production builds can opt
# additionally into `usdt-probes` for dtrace/bpftrace integration.
tracing-probes = []

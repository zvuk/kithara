[package]
name = "kithara-net"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "HTTP networking with retry, timeout, and streaming support"

[lints]
workspace = true

[features]
test-utils = []
perf = ["dep:hotpath", "hotpath/hotpath"]

[dependencies]
bon = { workspace = true }
kithara-platform = { workspace = true }
kithara-test-macros = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
reqwest = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
url = { workspace = true }
async-trait = { workspace = true }
unimock = { workspace = true }
hotpath = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }
reqwest = { workspace = true, features = ["rustls", "stream"] }
tokio-util = { workspace = true, features = ["full"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { workspace = true, features = ["stream"] }
gloo-timers = { workspace = true }

[dev-dependencies]
kithara-net = { path = ".", default-features = false }
kithara-test-utils = { workspace = true, features = ["test-utils"] }
futures = { workspace = true }
wasm-bindgen-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
axum = { workspace = true }
tower = { workspace = true }
memory-stats = { workspace = true }

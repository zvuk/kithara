<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kithara Play WASM</title>
    <link data-trunk rel="copy-file" href="../../logo.svg" />
    <link data-trunk rel="copy-file" href="_headers" />
    <link data-trunk rel="copy-file" href="coi-serviceworker.js" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 860px;
            margin: 24px auto;
            padding: 0 16px 24px;
            background: #151a23;
            color: #edf2f7;
        }
        .header {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 16px;
        }
        .logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 10px;
            background: #0f141d;
            border: 1px solid #2a3442;
            padding: 8px;
        }
        h1 { color: #ff5d5d; font-size: 26px; }
        .subtitle { color: #97a5b8; font-size: 13px; }
        .card {
            background: #0f141d;
            border: 1px solid #2a3442;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .row { display: flex; gap: 8px; align-items: center; }
        .row + .row { margin-top: 10px; }
        input[type="text"] {
            flex: 1;
            padding: 9px 12px;
            font-size: 14px;
            background: #111a27;
            border: 1px solid #2e3a4e;
            color: #edf2f7;
            border-radius: 6px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #ff5d5d; }
        button {
            padding: 9px 14px;
            border: none;
            border-radius: 6px;
            background: #ff5d5d;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        button:hover { background: #ef4b4b; }
        button:disabled { background: #5b6370; cursor: not-allowed; }
        #playlist {
            margin-top: 10px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
        }
        #playlist li {
            border: 1px solid #2a3442;
            border-radius: 6px;
            padding: 8px 10px;
            background: #111a27;
            cursor: pointer;
            font-size: 13px;
            color: #dce3ee;
            word-break: break-all;
        }
        #playlist li.active {
            border-color: #ff5d5d;
            background: #2c1720;
        }
        #playlist li:hover { border-color: #ff8989; }
        input[type="range"] { flex: 1; accent-color: #ff5d5d; }
        .setting-label {
            min-width: 74px;
            color: #9bb0c8;
            font-size: 13px;
        }
        .setting-value {
            min-width: 64px;
            color: #9bb0c8;
            font-family: monospace;
            text-align: right;
        }
        .time { min-width: 46px; color: #9bb0c8; font-family: monospace; }
        #status {
            font-size: 13px;
            color: #9bb0c8;
            font-family: monospace;
            margin-bottom: 10px;
        }
        .eq-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            margin-top: 8px;
        }
        .eq-band {
            border: 1px solid #2a3442;
            border-radius: 8px;
            padding: 8px;
            background: #111a27;
        }
        .eq-band label {
            display: block;
            font-size: 11px;
            color: #9bb0c8;
            margin-bottom: 6px;
        }
        .eq-band .gain {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            color: #f3f6fb;
            font-family: monospace;
        }
        #event-log {
            background: #0b1018;
            border: 1px solid #2a3442;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            color: #9fb0c6;
            max-height: 220px;
            overflow-y: auto;
        }
        #event-log .error { color: #ff7f7f; }
        #event-log .info { color: #65f0d3; }
        @media (max-width: 740px) {
            .eq-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .header { align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img class="logo" src="logo.svg" alt="Kithara logo" />
        <div>
            <h1>Kithara Play WASM</h1>
            <p class="subtitle">Playlist + crossfade + EQ on top of kithara-play <span id="build-info" style="color:#6f7d90"></span></p>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <input type="text" id="url-input" placeholder="Track URL (.m3u8 / .mp3 / etc)">
            <button id="add-btn" disabled>Add To Playlist</button>
        </div>
        <ul id="playlist"></ul>
    </div>

    <div class="card">
        <div class="row">
            <button id="play-btn" disabled>Play</button>
            <button id="pause-btn" disabled>Pause</button>
            <button id="stop-btn" disabled>Stop</button>
        </div>
        <div class="row">
            <span class="time" id="position">0:00</span>
            <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.1" disabled>
            <span class="time" id="duration">0:00</span>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <label class="setting-label" for="volume-slider">Volume</label>
            <input type="range" id="volume-slider" min="0" max="1" value="0.05" step="0.01" disabled>
            <span class="setting-value" id="volume-value">100%</span>
        </div>
        <div class="row">
            <label class="setting-label" for="crossfade-slider">Crossfade</label>
            <input type="range" id="crossfade-slider" min="0" max="10" value="5" step="0.1" disabled>
            <span class="setting-value" id="crossfade-value">5.0s</span>
        </div>
    </div>

    <div class="card">
        <div class="row" style="justify-content: space-between;">
            <strong style="font-size: 13px; color:#c9d4e5;">Equalizer</strong>
            <button id="eq-reset-btn" disabled>Reset EQ</button>
        </div>
        <div class="eq-grid" id="eq-grid"></div>
    </div>

    <div id="status">Initializing WASM...</div>
    <div id="event-log"></div>

    <script src="./coi-serviceworker.js"></script>
    <script type="module">
        const $ = id => document.getElementById(id);
        const fmt = ms => {
            const s = Math.max(0, Math.floor(ms / 1000));
            return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
        };
        const coiReloadKey = 'kithara_coi_wait_reloaded';

        function log(msg, cls = '') {
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.textContent = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
            $('event-log').appendChild(div);
            $('event-log').scrollTop = $('event-log').scrollHeight;
        }

        function setControlsEnabled(on) {
            for (const id of ['add-btn','play-btn','pause-btn','stop-btn','seek-slider','volume-slider','crossfade-slider','eq-reset-btn'])
                $(id).disabled = !on;
        }

        // --- COI runtime check (same logic as before) ---
        function ensureRuntime() {
            const d = {
                crossOriginIsolated: self.crossOriginIsolated === true,
                secureContext: self.isSecureContext === true,
                sharedArrayBuffer: typeof SharedArrayBuffer !== 'undefined',
            };
            if (d.crossOriginIsolated) sessionStorage.removeItem(coiReloadKey);
            if (d.secureContext && d.sharedArrayBuffer && d.crossOriginIsolated) return true;

            const waitingForCoiReload =
                d.secureContext && !d.crossOriginIsolated &&
                typeof navigator.serviceWorker !== 'undefined' &&
                !navigator.serviceWorker.controller;
            if (waitingForCoiReload) {
                setControlsEnabled(false);
                $('status').textContent = 'Waiting for cross-origin isolation (service worker reload)...';
                log('Waiting for COI service worker to activate and reload the page.', 'info');
                navigator.serviceWorker.ready.then(() => {
                    if (navigator.serviceWorker.controller || self.crossOriginIsolated === true) {
                        sessionStorage.removeItem(coiReloadKey);
                        return;
                    }
                    if (sessionStorage.getItem(coiReloadKey) === '1') {
                        log('COI service worker is active but page is still uncontrolled. Reload manually.', 'error');
                        return;
                    }
                    sessionStorage.setItem(coiReloadKey, '1');
                    window.location.reload();
                }).catch(err => log(`Service worker ready failed: ${err}`, 'error'));
                return false;
            }

            setControlsEnabled(false);
            $('status').textContent = 'Environment is not ready for WASM audio playback';
            log(`Runtime check failed: secureContext=${d.secureContext} crossOriginIsolated=${d.crossOriginIsolated} sharedArrayBuffer=${d.sharedArrayBuffer}`, 'error');
            return false;
        }

        if (!ensureRuntime()) throw new Error('Runtime not ready');

        // --- Init WASM (setup() runs automatically via #[wasm_bindgen(start)]) ---
        const wasm = await import('./kithara-wasm.js');
        await wasm.default();

        const player = new wasm.Player();
        window.__player = player;

        $('build-info').textContent = `(${wasm.build_info()})`;

        // --- Playlist (JS-side state, NOT in WASM memory) ---
        const playlist = [
            { url: 'https://stream.silvercomet.top/track.mp3', label: 'MP3 Track' },
            { url: 'https://stream.silvercomet.top/hls/master.m3u8', label: 'HLS Stream' },
        ];
        let currentIndex = -1;
        let selectingTrack = false;

        function renderPlaylist() {
            const ul = $('playlist');
            ul.textContent = '';
            playlist.forEach((track, i) => {
                const li = document.createElement('li');
                li.textContent = `${i + 1}. ${track.label}`;
                if (i === currentIndex) li.classList.add('active');
                li.onclick = async () => {
                    if (selectingTrack) return;
                    selectingTrack = true;
                    setControlsEnabled(false);
                    $('status').textContent = `Loading ${track.label}...`;
                    try {
                        await player.select_track(track.url);
                        currentIndex = i;
                        $('status').textContent = `Playing ${track.label}`;
                        log(`Track selected: ${track.label}`, 'info');
                    } catch (err) {
                        $('status').textContent = `Track load failed: ${err}`;
                        log(`Track load failed: ${err}`, 'error');
                    } finally {
                        selectingTrack = false;
                        setControlsEnabled(true);
                        renderPlaylist();
                    }
                };
                ul.appendChild(li);
            });
        }

        // --- Add track ---
        $('add-btn').onclick = () => {
            const url = $('url-input').value.trim();
            if (!url) return;
            playlist.push({ url, label: url });
            $('url-input').value = '';
            renderPlaylist();
            log(`Added track: ${url}`, 'info');
        };

        // --- Transport ---
        $('play-btn').onclick = () => { player.play(); $('status').textContent = 'Playing'; log('Play', 'info'); };
        $('pause-btn').onclick = () => { player.pause(); $('status').textContent = 'Paused'; log('Pause', 'info'); };
        $('stop-btn').onclick = () => {
            player.stop();
            $('seek-slider').value = '0';
            $('position').textContent = '0:00';
            $('status').textContent = 'Stopped';
            log('Stop', 'info');
        };

        // --- Seek ---
        $('seek-slider').oninput = () => {
            $('position').textContent = fmt(Number($('seek-slider').value));
        };
        $('seek-slider').onchange = () => {
            const ms = Number($('seek-slider').value);
            player.seek(ms);
            log(`Seek to ${fmt(ms)}`, 'info');
        };

        // --- Volume ---
        $('volume-slider').oninput = () => {
            const v = Number($('volume-slider').value);
            player.set_volume(v);
            $('volume-value').textContent = `${Math.round(v * 100)}%`;
        };

        // --- Crossfade ---
        $('crossfade-slider').oninput = () => {
            $('crossfade-value').textContent =
                Number($('crossfade-slider').value) <= 0 ? 'Off'
                : `${Number($('crossfade-slider').value).toFixed(1)}s`;
        };
        $('crossfade-slider').onchange = () => {
            player.set_crossfade_seconds(Number($('crossfade-slider').value));
        };

        // --- Equalizer ---
        function renderEq() {
            const grid = $('eq-grid');
            grid.textContent = '';
            const bands = player.eq_band_count();
            for (let i = 0; i < bands; i++) {
                const band = document.createElement('div');
                band.className = 'eq-band';
                const label = document.createElement('label');
                label.textContent = `Band ${i + 1}`;
                const slider = document.createElement('input');
                Object.assign(slider, {
                    type: 'range', min: '-24', max: '6', step: '0.1',
                    value: String(player.eq_gain(i)),
                });
                const gain = document.createElement('span');
                gain.className = 'gain';
                gain.textContent = `${Number(slider.value).toFixed(1)} dB`;
                slider.oninput = () => {
                    gain.textContent = `${Number(slider.value).toFixed(1)} dB`;
                };
                slider.onchange = () => player.set_eq_gain(i, Number(slider.value));
                band.append(label, slider, gain);
                grid.appendChild(band);
            }
        }
        $('eq-reset-btn').onclick = () => { player.reset_eq(); renderEq(); log('EQ reset', 'info'); };

        // --- UI loop (requestAnimationFrame) ---
        function tick() {
            player.tick();

            const pos = player.get_position_ms();
            const dur = player.get_duration_ms();
            $('position').textContent = fmt(pos);
            $('duration').textContent = fmt(dur);
            if (dur > 0) {
                $('seek-slider').max = String(dur);
                if (!$('seek-slider').matches(':active')) {
                    $('seek-slider').value = String(Math.min(pos, dur));
                }
            }

            const events = player.take_events();
            if (events) {
                const logEl = $('event-log');
                for (const line of events.split('\n')) {
                    if (!line) continue;
                    const div = document.createElement('div');
                    div.textContent = `[${new Date().toISOString().slice(11, 23)}] ${line}`;
                    if (/error|failed|closed|lagged/i.test(line)) div.className = 'error';
                    logEl.appendChild(div);
                }
                logEl.scrollTop = logEl.scrollHeight;
            }

            requestAnimationFrame(tick);
        }

        // --- Init ---
        {
            const initVol = Number($('volume-slider').value);
            player.set_volume(initVol);
        }
        renderPlaylist();
        renderEq();
        $('volume-value').textContent = `${Math.round(player.get_volume() * 100)}%`;
        $('crossfade-value').textContent = `${player.get_crossfade_seconds().toFixed(1)}s`;
        setControlsEnabled(true);
        $('status').textContent = 'Ready';
        log('WASM player initialized', 'info');
        requestAnimationFrame(tick);
    </script>
</body>
</html>

[package]
name = "kithara-wasm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "WASM HLS audio player"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
tracing = { workspace = true }
tokio = { workspace = true }
rayon = { workspace = true, optional = true }

[features]
default = ["threads"]
# Enable wasm-bindgen-rayon thread pool (requires atomics + bulk-memory target features).
threads = ["dep:rayon", "dep:wasm-bindgen-rayon"]
internal = []

[target.'cfg(target_arch = "wasm32")'.dependencies]
kithara-platform = { workspace = true }
kithara-play = { workspace = true, default-features = false, features = ["file", "hls", "backend-cpal", "wasm-bindgen"] }
tracing-wasm = { workspace = true }
tracing-log = { workspace = true }
console_error_panic_hook = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
wasm-bindgen-rayon = { workspace = true, optional = true }
web-sys = { workspace = true }
js-sys = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
kithara-wasm = { path = ".", default-features = false, features = ["internal"] }

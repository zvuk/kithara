# Workaround: nightly removed panic_immediate_abort as a build-std-feature.
# It is now a real panic strategy: -Cpanic=immediate-abort.
# Pre-setting build-std-features here prevents wasm-slim from injecting
# the removed feature (it skips if the key already exists).

[unstable]
build-std = ["std", "panic_abort", "core", "alloc"]
build-std-features = []

[target.wasm32-unknown-unknown]
rustflags = ["-Zunstable-options", "-Cpanic=immediate-abort"]

[package]
name = "kithara-test-utils"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Shared test utilities for kithara workspace"
publish = false

[lints]
workspace = true

[dependencies]
kithara-stream = { workspace = true }
kithara-storage = { workspace = true }
kithara-platform = { workspace = true }
kithara-test-macros = { workspace = true }
tokio-util = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }
url = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tracing-wasm = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
axum = { workspace = true }
tower-http = { workspace = true }
tokio = { workspace = true, features = ["net", "rt"] }

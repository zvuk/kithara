[package]
name = "kithara-test-utils"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Shared test utilities for kithara workspace"

[lints]
workspace = true

[features]
default = ["hang"]
hang = ["dep:web-time", "dep:serde", "dep:serde_json"]
mock = ["dep:unimock"]
probe = ["dep:usdt"]

[dependencies]
kithara-events = { workspace = true, features = ["downloader"] }
kithara-platform = { workspace = true }
kithara-test-macros = { workspace = true }
num-traits = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }

web-time = { workspace = true, optional = true }

serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
unimock = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tracing-wasm = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha1", path = "../kithara-workspace-hack" }
usdt = { workspace = true, optional = true }
backtrace = { workspace = true }
tokio = { workspace = true, features = ["time", "rt"] }
tokio-util = { workspace = true }

[package]
name = "kithara-test-utils"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "kithara test runtime: probe/hang/mock helpers (no-op in release)."
keywords = ["audio", "testing", "kithara", "probe"]
categories = ["development-tools::testing"]

[lints]
workspace = true

[features]
default = ["hang"]
flash = ["kithara-platform/flash"]
hang = ["dep:serde", "dep:serde_json"]
mock = ["dep:unimock"]
probe = ["dep:usdt"]
# HTTP backend forwarding (kithara-net reached via kithara-events).
client-reqwest = ["kithara-events/client-reqwest"]
client-wreq = ["kithara-events/client-wreq"]
tls-rustls = ["kithara-events/tls-rustls"]
tls-native = ["kithara-events/tls-native"]

[dependencies]
kithara-events = { workspace = true, features = ["downloader"] }
kithara-platform = { workspace = true }
kithara-test-macros = { workspace = true }
num-traits = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }

serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
unimock = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tracing-wasm = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha3", path = "../kithara-workspace-hack" }
usdt = { workspace = true, optional = true }
backtrace = { workspace = true }
tokio = { workspace = true, features = ["time", "rt"] }

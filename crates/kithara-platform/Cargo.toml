[package]
name = "kithara-platform"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Platform-aware primitives (sync, traits, time) for native and wasm32 targets"

[lints]
workspace = true

[features]
internal = []
stale-detector = []

[dependencies]
futures = { workspace = true }
wasm_safe_thread = { workspace = true }
web-time = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = ["time", "sync", "rt"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }

[dev-dependencies]
kithara-platform = { path = ".", default-features = false, features = ["internal", "stale-detector"] }
kithara-test-macros = { workspace = true }
wasm-bindgen-test = { workspace = true }

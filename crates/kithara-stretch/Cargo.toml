[package]
name = "kithara-stretch"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Time-stretch DSP contracts, backend adapters, and region planning."
keywords = ["audio", "dsp", "time-stretch", "pitch", "playback"]
categories = ["multimedia::audio"]

[features]
default = ["stretch-signalsmith"]
stretch-signalsmith = ["dep:signalsmith-stretch"]
stretch-bungee = ["dep:bungee-rs"]

[dependencies]
num-traits = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha4", path = "../kithara-workspace-hack" }

bungee-rs = { workspace = true, optional = true }
signalsmith-stretch = { workspace = true, optional = true }

[lints]
workspace = true

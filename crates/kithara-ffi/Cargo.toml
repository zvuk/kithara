[package]
name = "kithara-ffi"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Cross-platform FFI adapter for the kithara audio player"
publish = false

[lib]
crate-type = ["lib", "staticlib", "cdylib"]

[[bin]]
name = "uniffi-bindgen"
path = "src/uniffi_bindgen.rs"
required-features = ["backend-uniffi"]

[lints]
workspace = true

[dependencies]
kithara = { workspace = true }
kithara-platform = { workspace = true }
kithara-events = { workspace = true }

tokio-util = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }

uniffi = { workspace = true, optional = true, features = ["cli"] }

[features]
default = ["backend-uniffi"]
backend-uniffi = ["dep:uniffi"]
apple = ["kithara/apple"]

[dev-dependencies]
futures = { workspace = true }
kithara = { workspace = true, features = ["test-utils"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[target.'cfg(target_os = "android")'.dependencies]
jni = { workspace = true }
ndk-context = { workspace = true }
rustls-platform-verifier = { workspace = true }
tracing-android = { workspace = true }
tracing-subscriber = { workspace = true }

[package]
name = "kithara-ffi"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Cross-platform FFI adapter for the kithara audio player"
publish = false

[lib]
crate-type = ["lib", "staticlib", "cdylib"]

[[bin]]
name = "uniffi-bindgen"
path = "src/uniffi_bindgen.rs"
required-features = ["backend-uniffi"]

[lints]
workspace = true

[dependencies]
kithara = { workspace = true, features = ["file", "hls"] }
kithara-drm = { workspace = true }
kithara-platform = { workspace = true }
kithara-events = { workspace = true }
kithara-queue = { workspace = true }
# Optional direct dep so the `test` feature can enable `internal` on
# kithara-play (needed for `init_offline_backend` / offline module).
kithara-play = { workspace = true, optional = true, default-features = false, features = ["backend-cpal", "internal"] }
bytes = { workspace = true }

tokio-util = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }

uniffi = { workspace = true, optional = true, features = ["cli"] }
tokio = { workspace = true, optional = true, features = ["macros", "rt-multi-thread"] }
# Pulled in by firewheel-cpal transitively; surfaced as a direct dep under
# `test` so the probe JNI can enumerate host/device configs without
# touching the production firewheel backend types.
cpal = { workspace = true, optional = true }

[features]
default = ["backend-uniffi"]
backend-uniffi = ["dep:uniffi"]
apple = ["kithara/apple"]
android = ["kithara/android"]
# Dev-only conveniences enabled in xcframework builds for demo/staging.
# Currently: accepts TLS certs with invalid hostname / CA / expiry.
# Not for production use.
dev = []
# Test-only conveniences enabled in debug android builds for diagnostics.
# Exposes JNI entrypoints that render through the offline firewheel
# backend and write WAV output, bypassing cpal/AAudio. Never ship in a
# release AAR.
test = ["kithara/test-utils", "dep:kithara-play", "dep:tokio", "dep:cpal"]

[dev-dependencies]
futures = { workspace = true }
kithara = { workspace = true, features = ["test-utils"] }
kithara-test-utils = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[target.'cfg(target_os = "android")'.dependencies]
jni = { workspace = true }
# rustls-platform-verifier 0.6.2 pins jni 0.21. Workspace jni is 0.22.
# We bridge the two by importing 0.21 as `jni_rpv` solely for the
# `init_with_env` call.
jni_rpv = { package = "jni", version = "0.21.1" }
ndk-context = { workspace = true }
rustls-platform-verifier = { workspace = true }
tracing-android = { workspace = true }

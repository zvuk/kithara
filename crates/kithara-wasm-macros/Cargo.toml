[package]
name = "kithara-wasm-macros"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Proc-macro crate: #[wasm_export] generates wasm_bindgen free functions from Player methods"
publish = false

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

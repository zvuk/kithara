[package]
name = "kithara-drm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "DRM decryption support for kithara (AES-128-CBC and extensible key processing)"

[lints]
workspace = true

[package.metadata.cargo-machete]
ignored = ["kithara-workspace-hack"]

[dependencies]
aes = { workspace = true }
bon = { workspace = true }
bytes = { workspace = true }
cbc = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha1", path = "../kithara-workspace-hack" }

[dev-dependencies]
kithara-drm = { path = ".", default-features = false }
kithara-test-utils = { path = "../kithara-test-utils", features = ["mock", "probe"] }
wasm-bindgen-test = { workspace = true }

# Compile-time defaults for kithara-app. Baked into the binary by
# `build.rs` (see same crate) and surfaced via `kithara_app::baked::*`.
# Edits here trigger a full rebuild of the crate.
#
# Secrets MUST NOT be inlined here — use `$KITHARA_...` env references
# instead and put the value in the workspace `.env` (gitignored) or
# the build shell. Inline values are fine for non-secrets that ship in
# every client (e.g. the staging cipher key).
#
# `build.rs` wraps every value read from an env reference with
# `obfstr!()` so it does not appear as a plain run of bytes in
# `strings` output.

playback:
  crossfade_seconds: 5.0
  eq_band_count: 10

network:
  should_accept_invalid_certs: true
  compression: [gzip, deflate]
  size_probe_method: range_get

playlist:
  tracks:
    # - https://stream.silvercomet.top/track.mp3
    # - https://stream.silvercomet.top/hls/master.m3u8
    - https://stream.silvercomet.top/drm/master.m3u8
    # - https://cdn-edge.zvq.me/track/streamhq?id=27390231
    # - https://cdn-edge.zvq.me/track/streamhq?id=151585912
    # - https://cdn-edge.zvq.me/track/streamhq?id=125475417
    # - https://ecs-stage-slicer-01.zvq.me/drm/track/95038745_1/master.m3u8
    # - https://ecs-stage-slicer-01.zvq.me/hls/track/176000075_1/master.m3u8
    # - https://ecs-stage-slicer-01.zvq.me/drm/track/176000094_1/master.m3u8
    # - https://ecs-stage-slicer-01.zvq.me/hls/track/176000109_1/master.m3u8
    - https://cdn-hls-slicer.zvuk.com/drm/track/180082552_1/master.m3u8

# DRM key-server providers. Domains use the same matcher rules as
# `KeyProcessorRegistry`: bare host = exact match; `*.host` = subdomain
# wildcard. List both forms when the key URL lives on a bare host but
# media is served from subdomains (e.g. `zvuk.com/keyserver/...` plus
# `cdn-hls-slicer.zvuk.com/...`).
#
# Each provider must define exactly one of `cipher_key` (inline
# non-secret literal) or `cipher_env` (`$KITHARA_...` env reference).
# Everything else goes through `headers` — values starting with `$`
# are env references (obfuscated like `cipher_env`); literal values
# pass through unchanged. `X-Encrypted-Key` is reserved (generated
# per request from the cipher_key).
drm:
  providers:
    - name: zvuk-prod
      domains: [zvuk.com, "*.zvuk.com"]
      cipher_env: $KITHARA_DRM_PROD_KEY
      headers:
        User-Agent: OpenPlay - com.zvooq.openplay/4.30.0 (iPhone; iOS 17.5; Scale/3.00)
        X-Auth-Token: $KITHARA_DRM_PROD_AUTH_TOKEN
        X-SP-ZV: $KITHARA_DRM_PROD_SP_ZV_TOKEN
    - name: zvuk-stage
      domains: [zvq.me, "*.zvq.me"]
      cipher_key: $KITHARA_DRM_STAGE_KEY
      headers:
        User-Agent: OpenPlay - com.zvooq.openplay/4.30.0 (iPhone; iOS 17.5; Scale/3.00)
        X-Auth-Token: $KITHARA_DRM_STAGE_AUTH_TOKEN

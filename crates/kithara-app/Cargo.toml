[package]
name = "kithara-app"
version = "0.1.0"
edition.workspace = true
license = "MIT OR Apache-2.0"
publish = false

[lints]
workspace = true

[features]
default = ["tui", "gui"]
tui = ["dep:ratatui", "dep:crossterm"]
gui = ["dep:iced"]
# Build kithara-app as a plain library — exposes `config`/`sources`/`drm`
# modules without pulling in iced/ratatui. Used by integration tests
# (`tests/tests/kithara_queue/real_playlist.rs`).
lib-only = []

[dependencies]
kithara = { workspace = true, features = ["file", "hls"] }
kithara-drm = { workspace = true }
kithara-queue = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bytes = { workspace = true }
clap = { workspace = true }
crabtime = { workspace = true }
crossterm = { workspace = true, optional = true }
derivative = { workspace = true }
derive_setters = { workspace = true }
iced = { workspace = true, optional = true }
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }
obfstr = { workspace = true }
rand = { workspace = true }
ratatui = { workspace = true, optional = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
kithara = { workspace = true, features = ["apple"] }

[dev-dependencies]
kithara-test-macros = { workspace = true }
kithara-test-utils = { workspace = true }

[[bin]]
name = "kithara"
path = "src/main.rs"

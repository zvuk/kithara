[package]
name = "kithara-bufpool"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Generic sharded buffer pool for zero-allocation hot paths"

[dependencies]
kithara-platform = { workspace = true }
hotpath = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }

[features]
perf = ["dep:hotpath", "hotpath/hotpath"]
internal = []

[lints]
workspace = true

[dev-dependencies]
kithara-bufpool = { path = ".", default-features = false, features = ["internal"] }
kithara-test-macros = { workspace = true }
unimock = { workspace = true }
wasm-bindgen-test = { workspace = true }

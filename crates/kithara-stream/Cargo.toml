[package]
name = "kithara-stream"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Streaming source-to-bytes layer with sync Read+Seek for audio playback."
keywords = ["audio", "streaming", "hls", "io", "seek"]
categories = ["multimedia::audio", "asynchronous"]

[lints]
workspace = true

[dependencies]
bitflags = { workspace = true }
bon = { workspace = true }
bytes = { workspace = true }
delegate = { workspace = true }
futures = { workspace = true }
kithara-abr = { workspace = true }
kithara-events = { workspace = true, features = ["abr", "downloader"] }
kithara-net = { workspace = true }
kithara-platform = { workspace = true }
kithara-storage = { workspace = true }
kithara-test-utils = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
thunderdome = { workspace = true }
url = { workspace = true }
hotpath = { workspace = true, optional = true }
unimock = { workspace = true }

[features]
perf = ["dep:hotpath", "hotpath/hotpath"]
probe = []
mock = []

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.0.1-alpha3", path = "../kithara-workspace-hack" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = { workspace = true }
wasm_safe_thread = { workspace = true }

[dev-dependencies]
dashmap = { workspace = true }
kithara-stream = { path = ".", default-features = false }
kithara-test-utils = { path = "../kithara-test-utils", features = ["mock", "probe"] }
tempfile = { workspace = true }
wasm-bindgen-test = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
memory-stats = { workspace = true }
axum = { workspace = true }

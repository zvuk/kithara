[package]
name = "kithara-stream"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Streaming orchestration (source -> bytes stream) with sync Read+Seek"

[lints]
workspace = true

[dependencies]
bitflags = { workspace = true }
bytes = { workspace = true }
delegate = { workspace = true }
derive_setters = { workspace = true }
futures = { workspace = true }
kithara-abr = { workspace = true }
kithara-events = { workspace = true, features = ["abr", "downloader"] }
kithara-net = { workspace = true }
kithara-hang-detector = { workspace = true }
kithara-platform = { workspace = true }
kithara-probes = { workspace = true }
kithara-storage = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
thunderdome = { workspace = true }
tokio-util = { workspace = true }
url = { workspace = true }
hotpath = { workspace = true, optional = true }
unimock = { workspace = true, optional = true }

[features]
perf = ["dep:hotpath", "hotpath/hotpath"]
test-utils = ["unimock"]
internal = []
# USDT probes for production observability (dtrace/bpftrace) and
# defense-in-depth in tests against EventBus broadcast overflow.
# Disabled by default — release builds compile probes to no-ops.
# Tests and dev builds opt in via `kithara-stream/usdt-probes` or
# the workspace-level `--features` flag.
#
# Pulls `dep:usdt` because `#[kithara::probe]` expansion references
# `::usdt::provider!` paths directly (the attribute hard-codes
# `::usdt::...` so it must resolve from the consumer crate's deps).
usdt-probes = ["dep:usdt", "kithara-probes/usdt-probes"]
disable-hang-detector = [
    "kithara-hang-detector/disable-hang-detector",
    "kithara-platform/disable-hang-detector",
    "kithara-storage/disable-hang-detector",
]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kithara-workspace-hack = { version = "0.1", path = "../kithara-workspace-hack" }
tokio-util = { workspace = true, features = ["full"] }
usdt = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = { workspace = true }
wasm_safe_thread = { workspace = true }

[dev-dependencies]
kithara-stream = { path = ".", default-features = false, features = ["internal"] }
kithara-test-macros = { workspace = true }
kithara-test-utils = { workspace = true }
tokio-stream = { workspace = true }
tempfile = { workspace = true }
wasm-bindgen-test = { workspace = true }
unimock = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
memory-stats = { workspace = true }
axum = { workspace = true }

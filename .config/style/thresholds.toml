# Style-check thresholds. Empty file (or missing keys) → defaults from
# `xtask/src/style/config.rs`. Override only what you intend to differ
# from the default.

[comment_hygiene]
inline_max_lines = 3
doc_block_max_lines = 20
fn_density_threshold_pct = 30
fn_density_min_body_lines = 6
allowed_inline_markers = [
  "SAFETY:",
  "TODO:",
  "FIXME:",
  "XXX:",
  "NOTE:",
  "WHY:",
  "HACK:",
  "kithara:",
  "ast-grep-ignore:",
  "xtask-lint-ignore:",
]
exclude_paths = ["**/build.rs", "**/tests/**/fixtures/**"]

[non_english_text]
exclude_paths = [
  "assets/**",
  "**/assets/**",
  "fonts/**",
  "**/fonts/**",
  "models/**",
  "**/models/**",
  "fixtures/**",
  "**/fixtures/**",
  "target/**",
  "**/target/**",
  "docs/plans/**",
  "docs/specs/**",
  "android/gradle/wrapper/**",
]

[dead_doc_refs]
exclude_paths = [
  # lint-check implementations carry synthetic fixture paths in their unit tests
  "**/kithara-devtools/src/style/checks/*.rs",
  "assets/**",
  "**/assets/**",
  "fonts/**",
  "**/fonts/**",
  "models/**",
  "**/models/**",
  "fixtures/**",
  "**/fixtures/**",
  "target/**",
  "**/target/**",
  "docs/plans/**",
  "docs/specs/**",
  "android/gradle/wrapper/**",
]
allow_targets = []

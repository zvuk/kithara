# This file contains settings for `cargo hakari`.
# See https://docs.rs/cargo-hakari/latest/cargo_hakari/config for a full list of options.

hakari-package = "kithara-workspace-hack"

# Format version 4 (latest). Version field in dependency lines not needed
# since we use variant A publishing: cargo hakari disable → publish → generate.
dep-format-version = "4"

# Workspace resolver v2 (edition 2021+).
resolver = "2"

# Target platforms for feature unification.
platforms = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "aarch64-apple-ios",
]

# Exclude test-only and non-publishable crates from traversal.
# kithara-test-utils is test-only tooling; excluding it keeps its probe-feature
# env-filter (and its regex/regex-automata/aho-corasick) out of the shared hack.
# kithara-app's desktop deps (incl env-filter) are gated to non-iOS in its own
# manifest, and aarch64-apple-ios is a hakari platform, so env-filter resolves
# only for the desktop platforms — the iOS device closure (which never requests
# env-filter) stays regex-free. kithara-app itself stays TRAVERSED so the
# wreq/boring2 feature unification it needs is preserved (excluding it de-unifies
# boring-sys2's cert-compression features and breaks the boring2 build).
[traversal-excludes]
workspace-members = [
    "kithara-integration-tests",
    "kithara-ffi",
    "kithara-test-utils",
]

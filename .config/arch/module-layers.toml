# Per-crate intra-layer rules (opt-in).
# A file in a lower-indexed layer may not depend on a file in a higher-indexed layer.
# Crates without a `[[crate]]` entry are skipped (no constraints).

[[crate]]
name = "kithara-file"

  [[crate.layer]]
  index = 0
  name = "types"
  paths = ["src/error.rs", "src/config.rs"]

  [[crate.layer]]
  index = 1
  name = "coord"
  paths = ["src/coord.rs"]

  [[crate.layer]]
  index = 2
  name = "session"
  paths = ["src/session/**"]

  [[crate.layer]]
  index = 3
  name = "facade"
  paths = ["src/stream.rs", "src/internal.rs"]

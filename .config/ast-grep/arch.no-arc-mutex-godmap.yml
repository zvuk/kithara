id: arch.no-arc-mutex-godmap
message: |
  `Arc<Mutex<HashMap<…>>>` / `Arc<RwLock<HashMap<…>>>` — god-state with
  a map/dict behind a shared lock. Almost always an antipattern: the
  owner is diffuse, hot-path readers and writers contend for the same
  lock, state grows via add-key instead of an explicit contract.

  Alternatives:
    - actor / single-owner task + channel for write commands;
    - `dashmap` (per-shard lock) for genuinely concurrent KV;
    - `Arc<Vec<…>>` snapshot + `ArcSwap` for read-mostly;
    - drop the map entirely — god-map is often a symptom, not a structure.

  If this is a legitimate case, document the rationale in the owning
  crate's README.
severity: warning
language: Rust
files:
  - crates/**/src/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
rule:
  any:
    - pattern:
        context: "type _T = Arc<Mutex<HashMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<Mutex<BTreeMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<RwLock<HashMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<RwLock<BTreeMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::Mutex<HashMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::Mutex<BTreeMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::RwLock<HashMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::RwLock<BTreeMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::Mutex<HashMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::Mutex<BTreeMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::RwLock<HashMap<$K, $V>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::RwLock<BTreeMap<$K, $V>>>;"
        selector: generic_type

id: arch.no-implicit-clock
message: |
  Library code reads the wall clock directly via `Instant::now()` /
  `SystemTime::now()`. Hidden access to time defeats determinism: tests
  cannot pin a clock, simulation cannot replay a session, and the same
  function call yields different results depending on when it ran.

  Per AGENTS.md: "Tests must be deterministic". Inject a `Clock` (or
  whatever the crate calls its time port) from the top of the app and
  read time through it:

      // ❌  let now = Instant::now();
      // ✅  let now = self.clock.now();

  Tests can then substitute a `MockClock` / `ManualClock` and step time
  explicitly. App / FFI / wasm / xtask / test-support crates may keep
  the direct calls because they own the `Clock` impl that lib crates
  consume.
severity: warning
language: Rust
files:
  - crates/**/src/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
  # The platform crate OWNS the clock impl that lib crates consume; its native
  # backend legitimately touches the real wall clock.
  - "crates/kithara-platform/src/native/**"
# ast-grep is purely syntactic (no name resolution), so it cannot tell
# `use kithara_platform::time::Instant; Instant::now()` (the sanctioned
# platform clock) from `use std::time::Instant; Instant::now()` (banned).
# Flagging the bare `Instant::now()` form therefore false-positives on every
# legal platform-clock call. Instead we pin the banned origins precisely:
# the fully-qualified std/tokio calls, plus the std/tokio `use` imports that
# would let a bare call resolve to them. Platform-clock calls are never
# matched. (Grouped/aliased std imports are a residual blind spot, accepted
# because lib code uses the platform clock exclusively today.)
rule:
  any:
    - pattern: std::time::Instant::now()
    - pattern: std::time::SystemTime::now()
    - pattern: tokio::time::Instant::now()
    - pattern: use std::time::Instant
    - pattern: use std::time::SystemTime
    - pattern: use tokio::time::Instant

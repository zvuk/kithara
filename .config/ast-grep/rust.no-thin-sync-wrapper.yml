id: rust.no-thin-sync-wrapper
message: Thin sync wrappers with a single call are discouraged.
severity: error
language: Rust
files:
  - crates/**/src/**/*.rs
ignores:
  - crates/kithara-test-macros/**
rule:
  all:
    - kind: function_item
    - regex: '(?s)^\s*fn\s+\w+\s*\([^)]*\)\s*(?:->\s*[^\{]+)?\{\s*[A-Za-z0-9_:.]+\([^\n\)]*\);?\s*\}$'
    - not:
        inside:
          kind: impl_item
          stopBy: end
    - not:
        inside:
          kind: trait_item
          stopBy: end
    - not:
        inside:
          all:
            - kind: mod_item
            - follows:
                kind: attribute_item
                regex: 'cfg\(test\)'
                stopBy: end
          stopBy: end
    - not:
        has:
          kind: identifier
          field: name
          regex: '^(default|from|into|drop|fmt|clone|new|main|fallback_timeout|to_iced|to_ratatui|wait_range_hang_timeout)$'

id: arch.no-test-in-prod
message: |
  Тестовые артефакты не должны жить в production source. Имена с
  суффиксом `_for_test`/`_for_tests` или модули `tests`/`test` в
  `crates/*/src/` (вне `#[cfg(test)] mod`) загрязняют public API и
  rustdoc, попадают в `cargo build --features test-utils`, и часто
  создают параллельные пути записи, обходящие документированные
  prod-входы (см. AGENTS.md, "Do not introduce parallel mutable sources
  of truth without an explicit transition contract").

  Заменители:
    1. Использовать prod-вход (`AbrState::apply` вместо `set_variant_for_test`).
    2. Перенести helper в same-crate `#[cfg(test)] mod tests {}` блок.
    3. Перенести helper в crate-локальный `pub mod test_utils` под фичей
       или в `tests/src/` для cross-crate потребителей.

  Подавление допускается только через `// ast-grep-ignore: arch.no-test-in-prod`
  с обоснованием в комментарии (отсылка к плану/issue).
severity: error
language: Rust
files:
  - crates/**/src/**/*.rs
ignores:
  - "**/kithara-test-utils/**"
  - "**/kithara-test-macros/**"
  # `kithara-encode` is a test-infra crate (consumed only by
  # `kithara-test-utils` and `tests/`); no production dependency
  # graph reaches it. Ungated `pub mod test_pcm` is intentional —
  # the entire crate is test scaffolding.
  - "**/kithara-encode/**"
  - "**/tests/**"
  # Sibling test files pulled in via `#[cfg(test)] mod foo_test;` in
  # the parent — the cfg gate lives on the `mod` decl in lib.rs, not
  # at the top of the included file, so the AST `not follows cfg(test)`
  # carve-out can't see it. File-glob ignore is the only option.
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
  # `kithara-queue` lifecycle holds `register_for_test`, `complete_load_for_test`,
  # `insert_loaded_for_test`. Removing them requires introducing a `TrackLoader`
  # trait — tracked as a separate plan; see plan async-juggling-plum.md
  # ("Out of scope") for the DI replacement strategy.
  - "**/kithara-queue/src/queue/lifecycle.rs"
rule:
  all:
    - any:
        - all:
            - kind: function_item
            - has:
                field: name
                regex: '_for_test$|_for_tests$'
        - all:
            - kind: mod_item
            - has:
                field: name
                regex: '^test$|^tests$|_for_test$|_for_tests$'
        - all:
            - any:
                - kind: struct_item
                - kind: enum_item
                - kind: trait_item
            - has:
                field: name
                regex: '_for_test$|_for_tests$'
    - not:
        any:
          - follows:
              all:
                - kind: attribute_item
                - regex: 'cfg\([^)]*\btest\b'
                - not:
                    regex: 'any\([^)]*\bfeature\b'
              stopBy: end
          - inside:
              all:
                - kind: mod_item
                - follows:
                    all:
                      - kind: attribute_item
                      - regex: 'cfg\([^)]*\btest\b'
                      - not:
                          regex: 'feature'
                    stopBy: end
              stopBy: end

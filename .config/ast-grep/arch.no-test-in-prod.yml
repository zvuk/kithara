id: arch.no-test-in-prod
message: |
  Test artifacts must not live in production source. Names with the
  `_for_test`/`_for_tests` suffix or `tests`/`test` modules in
  `crates/*/src/` (outside `#[cfg(test)] mod`) pollute the public API
  and rustdoc, leak into `cargo build --features test-utils`, and often
  create parallel write paths that bypass documented prod entry points
  (see AGENTS.md, "Do not introduce parallel mutable sources of truth
  without an explicit transition contract").

  Replacements:
    1. Use the prod entry point (`AbrState::apply` instead of `set_variant_for_test`).
    2. Move the helper into a same-crate `#[cfg(test)] mod tests {}` block.
    3. Move the helper into a crate-local `pub mod test_utils` behind a
       feature, or into `tests/src/` for cross-crate consumers.

  Suppression is only allowed via `// ast-grep-ignore: arch.no-test-in-prod`
  with a justification in the comment (reference to a plan/issue).
severity: error
language: Rust
files:
  - crates/**/src/**/*.rs
ignores:
  - "**/kithara-test-utils/**"
  - "**/kithara-test-macros/**"
  # `kithara-encode` is a test-infra crate (consumed only by
  # `kithara-test-utils` and `tests/`); no production dependency
  # graph reaches it. Ungated `pub mod test_pcm` is intentional —
  # the entire crate is test scaffolding.
  - "**/kithara-encode/**"
  - "**/tests/**"
  # Sibling test files pulled in via `#[cfg(test)] mod foo_test;` in
  # the parent — the cfg gate lives on the `mod` decl in lib.rs, not
  # at the top of the included file, so the AST `not follows cfg(test)`
  # carve-out can't see it. File-glob ignore is the only option.
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
  # `kithara-queue` lifecycle holds `register_for_test`, `complete_load_for_test`,
  # `insert_loaded_for_test`. Removing them requires introducing a `TrackLoader`
  # trait — tracked as a separate plan; see plan async-juggling-plum.md
  # ("Out of scope") for the DI replacement strategy.
  - "**/kithara-queue/src/queue/lifecycle.rs"
rule:
  all:
    - any:
        - all:
            - kind: function_item
            - has:
                field: name
                regex: '_for_test$|_for_tests$'
        - all:
            - kind: mod_item
            - has:
                field: name
                regex: '^test$|^tests$|_for_test$|_for_tests$'
        - all:
            - any:
                - kind: struct_item
                - kind: enum_item
                - kind: trait_item
            - has:
                field: name
                regex: '_for_test$|_for_tests$'
    - not:
        any:
          - follows:
              all:
                - kind: attribute_item
                - regex: 'cfg\([^)]*\btest\b'
                - not:
                    regex: 'any\([^)]*\bfeature\b'
              stopBy: end
          - inside:
              all:
                - kind: mod_item
                - follows:
                    all:
                      - kind: attribute_item
                      - regex: 'cfg\([^)]*\btest\b'
                      - not:
                          regex: 'feature'
                    stopBy: end
              stopBy: end

id: idioms.derive-deref-candidate
message: Single-field Deref or DerefMut impl; use `#[derive(derive_more::Deref)]` or `#[derive(derive_more::DerefMut)]`.
severity: warning
language: Rust
files: ["crates/**/*.rs"]
ignores: ["**/tests/**", "**/test_*.rs", "**/*_test.rs", "**/*_tests.rs", "**/tests.rs"]
rule:
  any:
    - pattern: "impl Deref for $T { type Target = $TARGET; fn deref(&self) -> &Self::Target { &self.$F } }"
    - pattern: "impl DerefMut for $T { fn deref_mut(&mut self) -> &mut Self::Target { &mut self.$F } }"

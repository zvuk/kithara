id: idioms.join-of-join-alls
message: |
  `join(join_all(a), join_all(b))` — no short-circuit on error: if the
  first future in `a` fails after 50ms, the rest of `a` and all of `b`
  keep running to full timeout before you learn about the failure.
  That wastes I/O and lengthens the cold-start critical path.

  Replace with the short-circuit form:

      // ❌
      let (a_results, b_results) =
          join(join_all(futs_a), join_all(futs_b)).await;
      for r in a_results { r?; }
      for r in b_results { r?; }

      // ✅
      try_join(try_join_all(futs_a), try_join_all(futs_b)).await?;
      // or, if you prefer the macro:
      // try_join!(try_join_all(futs_a), try_join_all(futs_b))?;

  Note: if future closures wrap the result in a tuple `(key, result)`
  only so the `for` loop can destructure it (and `key` is then ignored
  via `_`), that's dead weight — after switching to `try_*`, the tuple
  becomes unnecessary and closures can return `Result<T, E>` directly.

  Suppress with `// ast-grep-ignore: idioms.join-of-join-alls` only when
  partial-success aggregation is the actual goal (per-result inspection
  even if some failed) — in that case `join_all` is intentional, but
  consider whether `FuturesUnordered` would express the intent more
  clearly.
severity: warning
language: Rust
files:
  - crates/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
rule:
  any:
    - pattern: join(join_all($A), join_all($B))
    - pattern: futures::future::join(futures::future::join_all($A), futures::future::join_all($B))

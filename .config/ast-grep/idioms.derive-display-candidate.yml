id: idioms.derive-display-candidate
message: Single-format Display impl; use `#[derive(derive_more::Display)]` with `#[display("...")]`.
severity: warning
language: Rust
files: ["crates/**/*.rs"]
ignores: ["**/tests/**", "**/test_*.rs", "**/*_test.rs", "**/*_tests.rs", "**/tests.rs"]
rule:
  any:
    - pattern: "impl Display for $T { fn fmt(&self, $F: &mut $FMT) -> $RET { write!($F, $LIT, self.$FIELD) } }"
    - pattern: "impl fmt::Display for $T { fn fmt(&self, $F: &mut $FMT) -> $RET { write!($F, $LIT, self.$FIELD) } }"
    - pattern: "impl Display for $T { fn fmt(&self, $F: &mut $FMT) -> $RET { $F.write_str($LIT) } }"
    - pattern: "impl fmt::Display for $T { fn fmt(&self, $F: &mut $FMT) -> $RET { $F.write_str($LIT) } }"
    - pattern: "impl Display for $T { fn fmt(&self, $F: &mut $FMT) -> $RET { write!($F, $LIT) } }"
    - pattern: "impl fmt::Display for $T { fn fmt(&self, $F: &mut $FMT) -> $RET { write!($F, $LIT) } }"
constraints:
  LIT: { kind: string_literal }

id: style.no-functions-in-lib-or-mod-rs
message: lib.rs/mod.rs should only contain module declarations and re-exports.
severity: warning
language: Rust
files:
  - crates/**/src/lib.rs
  - crates/**/src/**/mod.rs
ignores:
  - crates/kithara-wasm-macros/**
  - crates/kithara-hang-detector-macros/**
  - crates/kithara-test-macros/**
rule:
  kind: function_item

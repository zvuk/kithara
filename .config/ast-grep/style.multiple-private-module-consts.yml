id: style.multiple-private-module-consts
message: |
  Multiple private module-level constants found. If >2, group them into a
  `struct Consts`, a separate module, or an `enum Consts`. If used in a
  single impl, move into that impl.

  See xtask detector `const_group_enum_shape` for value-shape-aware
  recommendations: sequential → enum, power-of-2 → bitflags!, sparse
  hex → #[repr(T)] enum. The xtask detector also fires on pub /
  pub(crate) groups (this rule fires only on private), so prefer
  consulting it when grouping FFI constants.
severity: error
language: Rust
rule:
  all:
    - any:
        - kind: const_item
        - kind: static_item
    - not: { has: { kind: visibility_modifier } }
    - not:
        {
          inside:
            {
              any:
                [
                  { kind: impl_item },
                  { kind: trait_item },
                  { kind: function_item },
                  { kind: foreign_mod_item },
                  { kind: block },
                ],
              stopBy: end,
            },
        }
    - any:
        - follows:
            all:
              - any:
                  - kind: const_item
                  - kind: static_item
              - not: { has: { kind: visibility_modifier } }
            stopBy: end
        - precedes:
            all:
              - any:
                  - kind: const_item
                  - kind: static_item
              - not: { has: { kind: visibility_modifier } }
            stopBy: end

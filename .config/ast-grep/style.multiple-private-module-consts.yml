id: style.multiple-private-module-consts
message: "Multiple private module-level constants found. If >2, group them into a `struct Consts`, separate module or `enum Consts`. If used in a single impl, move to that impl."
severity: error
language: Rust
ignores:
  # P3 wholesale port from production/main PR #64 — production codebase
  # keeps multiple module-level consts (BOX_*, FADE_*, etc.) without the
  # `struct Consts` grouping. Audit sweeps these in P7 when the sibling
  # files (mp4.rs / pcm_time.rs) are reabsorbed into fmp4/ + pcm/timeline.rs.
  - crates/kithara-decode/src/gapless/**
  - crates/kithara-decode/src/mp4.rs
  - crates/kithara-decode/src/pcm_time.rs
rule:
  all:
    - any:
        - kind: const_item
        - kind: static_item
    - not: { has: { kind: visibility_modifier } }
    - not:
        {
          inside:
            {
              any:
                [
                  { kind: impl_item },
                  { kind: trait_item },
                  { kind: function_item },
                  { kind: foreign_mod_item },
                  { kind: block },
                ],
              stopBy: end,
            },
        }
    - any:
        - follows:
            all:
              - any:
                  - kind: const_item
                  - kind: static_item
              - not: { has: { kind: visibility_modifier } }
            stopBy: end
        - precedes:
            all:
              - any:
                  - kind: const_item
                  - kind: static_item
              - not: { has: { kind: visibility_modifier } }
            stopBy: end

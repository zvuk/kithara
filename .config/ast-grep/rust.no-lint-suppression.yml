id: rust.no-lint-suppression
message: |
  `#[allow(...)]` and `#[expect(...)]` are banned: a clippy or rustc warning is
  signal that something is wrong. The fix is the underlying code, not silencing
  the lint.

  Common substitutions:
    • clippy::cast_possible_truncation / cast_sign_loss / cast_precision_loss
        → use `u32::try_from(x)?` / `i64::try_from(x)?`
        → for intentional truncation, wrap in a named helper that captures the
          contract (`fn ms_from_secs_f64(s: f64) -> u64 { … }`) and place the
          cast inside that helper
        → for f32→u32 with bounded range, use `(x.clamp(0.0, MAX) as u32)` and
          rename the lint name
    • dead_code → delete the item
    • unused_variables / unused_imports → delete or expose them
    • unnecessary_qualification → add a `use` import
    • clippy::too_many_arguments → group params into a struct
    • unreachable_pub → reduce visibility to `pub(crate)`
    • clippy::cognitive_complexity → split the function

  Do NOT relocate the suppression — that is the same workaround in disguise:
    • `[lints.clippy] foo = "allow"` in a crate Cargo.toml is banned by
      `rust.no-crate-lint-allow`.
    • Wrapping the cast/dead-code/etc. in a one-line helper function and
      pushing the `#[expect]` onto that helper is also a workaround. The
      lint catches a code smell; relocating it to a wrapper does not fix
      the smell.

  Legitimate exceptions are file-globbed in this rule's `ignores:` list (FFI
  bindings, proc-macros, wasm-bindgen public surface). New exceptions must
  argue the case in the owning crate's README.md and be added to `ignores:`,
  not silenced inline.
severity: error
language: Rust
files:
  - crates/**/*.rs
  - tests/**/*.rs
  - xtask/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
  # Mock implementations are test-fixture surfaces by design: counts/values
  # in mock readers/peers are bounded by construction, and casts there model
  # "fake but believable" data, not real numerical contracts. Keeping mocks
  # in the ratchet would force every fixture to grow Result-typed numerics
  # without buying any production safety. Per-file location holds the
  # `#![allow(...)]` with a `reason` attribute.
  - "**/src/mock.rs"
  - "**/src/mock/**"
  # `kithara-test-utils` and `kithara-test-macros` are workspace test
  # infrastructure: every consumer of these crates is itself a test target.
  # Lint suppressions inside fixture builders, mock peers, hls/wav helpers,
  # and proc-macro expansion are documented and reasoned (`reason = "..."`)
  # at each site. Production code never depends on them at runtime, so the
  # discipline lives at the boundary, not inside.
  - "**/kithara-test-utils/**"
  - "**/kithara-test-macros/**"
  # FFI binding modules — `#![allow(unsafe_code)]` is a structural
  # requirement (raw `extern` blocks, JNI/CoreAudio handles). The
  # `#[deny(unsafe_code)]` ratchet at crate root keeps non-FFI code
  # honest; these directories own the carve-out.
  - "**/kithara-net/src/backend/apple/**"
  - "**/kithara-decode/src/apple/**"
  - "**/kithara-decode/src/android/**"
  # Crate root file holds two lint allows that quiet `unimock`-generated
  # code (`ignored_unit_patterns`, `allow_attributes`). Documented
  # inline; carve-out scoped to the entry point only.
  - "**/kithara-decode/src/lib.rs"
  # `usdt_wire.rs` is the project's single-point holder of USDT inline
  # asm. The `usdt::provider!` proc-macro expansion mixes statics with
  # asm statements, tripping `clippy::items_after_statements`; the
  # `prov` module owns `#[expect(unsafe_code, ...)]` so consumers can
  # keep `#![forbid(unsafe_code)]`. Both suppressions are structural
  # requirements of the macro, not code smells — relocating them out of
  # `usdt_wire.rs` would reintroduce `unsafe` everywhere the
  # `#[kithara::probe]` macro expands. See module docstring for
  # rationale and `kithara-probes/README.md` for the carve-out contract.
  - "**/kithara-probes/src/usdt_wire.rs"
rule:
  all:
    - any:
        - pattern: "#[allow($$$ARGS)]"
        - pattern: "#[expect($$$ARGS)]"
        - pattern: "#![allow($$$ARGS)]"
        - pattern: "#![expect($$$ARGS)]"
    # Skip suppressions inside an inline `#[cfg(test)] mod ...` block. Test
    # code may use `#[allow]` for fixture-specific concerns (`unused_variables`
    # in setup helpers, deliberately wide types in mocks) without polluting
    # production lint discipline. External test files are already covered by
    # the path-based `ignores` above; this clause covers `mod tests` blocks
    # nested inside production source files. Pattern mirrors `rust.no-thin-sync-wrapper`.
    - not:
        inside:
          all:
            - kind: mod_item
            - follows:
                kind: attribute_item
                regex: 'cfg\(test\)'
                stopBy: end
          stopBy: end

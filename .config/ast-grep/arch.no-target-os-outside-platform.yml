id: arch.no-target-os-outside-platform
message: |
  `#[cfg(target_os = ...)]` or `#[cfg(target_arch = ...)]` outside the
  platform layer. Move the conditional code into `kithara-platform` (or
  `kithara-ffi/web` for browser-only logic), expose a stable trait/fn
  from there, and call that abstraction from this crate.

  Why: every business-logic file with a target gate is a place where the
  wasm or apple build can silently regress. The platform crates exist
  precisely to centralize these gates.

  Suppress with `// ast-grep-ignore: arch.no-target-os-outside-platform`
  only when the gate is on a `mod` that is itself a thin platform shim
  (document the why in the owning crate's README.md).
severity: warning
language: Rust
files:
  - crates/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
  # `kithara-ffi/src/lib.rs` is the single structural boundary for the
  # browser/wasm bindings (`pub mod web;` is the only target_arch gate)
  # and for Android JNI (`pub(crate) mod android;` is the only target_os
  # gate). The wasm submodule itself contains zero inline cfg gates
  # (analogous to the Apple/Android subtrees). Documented in
  # `crates/kithara-ffi/README.md`.
  - "crates/kithara-ffi/src/lib.rs"
  # `kithara-play` hosts the audio session, which has unavoidable platform
  # asymmetry: native runs a dedicated engine thread with a ringbuf+park
  # wake-up, while wasm32 splits state between the main thread (where the
  # AudioContext must live) and Workers (which proxy commands via mpsc).
  # `impls/session/mod.rs` is the single structural boundary — two
  # `#[cfg]` declarations on `mod host_native;` / `mod host_web;`. Inside
  # each host file there are zero inline cfg gates. Documented in
  # `crates/kithara-play/README.md` "Session Hosting".
  - "crates/kithara-play/src/impls/session/mod.rs"
rule:
  any:
    - pattern: "#[cfg(target_os = $_)]"
    - pattern: "#[cfg(target_arch = $_)]"
    - pattern: "#[cfg(any($$$, target_os = $_, $$$))]"
    - pattern: "#[cfg(any($$$, target_arch = $_, $$$))]"
    - pattern: "#[cfg(all($$$, target_os = $_, $$$))]"
    - pattern: "#[cfg(all($$$, target_arch = $_, $$$))]"
    - pattern: "#[cfg(not(target_os = $_))]"
    - pattern: "#[cfg(not(target_arch = $_))]"

id: style.prefer-default-derive
message: |
  `fn new() -> Self { Self { ... } }` with no parameters is a candidate
  for `#[derive(Default)]` (when all fields have their own `Default`)
  or for `impl Default for $TYPE` with custom values.

      // ❌
      impl Headers {
          pub fn new() -> Self {
              Self { inner: HashMap::new() }
          }
      }

      // ✅ (when HashMap::new() == HashMap::default())
      #[derive(Default)]
      pub struct Headers { inner: HashMap<String, String> }

      // ✅ (when custom values are needed)
      impl Default for RetryPolicy {
          fn default() -> Self {
              Self {
                  base_delay: Duration::from_millis(100),
                  max_delay: Duration::from_secs(5),
                  max_retries: 3,
              }
          }
      }

  IMPORTANT (Category 4 in the meta-plan, Wave 6): manual review per
  type is required — derived `Default` can break invariants (e.g.
  `Duration::default() = 0` for a timeout = bug). Do not blanket-apply
  `#[derive(Default)]` without understanding invariants.

  Suppress with `// ast-grep-ignore: style.prefer-default-derive` when
  `new()` has semantics that differ from Default (e.g. allocates,
  registers, or has another side effect).

  See .docs/plans/2026-05-23-rust-idioms-refactor.md (Category 4,
  Wave 6).
severity: error
language: Rust
files:
  - crates/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
rule:
  any:
    - pattern: |
        fn new() -> Self {
            $$$BODY
        }
    - pattern: |
        pub fn new() -> Self {
            $$$BODY
        }
    - pattern: |
        pub(crate) fn new() -> Self {
            $$$BODY
        }

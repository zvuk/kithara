id: arch.no-web-time
message: |
  Direct use of the `web_time` crate outside `kithara-platform`. `web_time`
  is the wasm clock backing for `kithara_platform::time::Instant`; it must
  stay an implementation detail of the platform crate so that the platform —
  and only the platform — owns the time primitive and can swap in a
  mock/virtual clock behind one API.

      // ❌  use web_time::Instant;
      // ✅  use kithara_platform::time::Instant;

  This is an ERROR gate covering ALL workspace Rust — production AND tests.
  `web_time` is not a direct dependency of any crate but kithara-platform;
  keep it that way.
severity: error
language: Rust
files:
  - crates/**/*.rs
  - tests/**/*.rs
ignores:
  - crates/kithara-platform/**
rule:
  any:
    - pattern: web_time::$$$REST
    - pattern: use web_time

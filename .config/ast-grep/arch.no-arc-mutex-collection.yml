id: arch.no-arc-mutex-collection
message: |
  `Arc<Mutex<Vec<…>>>` / `Arc<RwLock<VecDeque<…>>>` — a shared collection
  behind a lock. Usually a symptom: one component reads, another writes,
  no clear owner, and that's encoded in the type instead of an explicit
  contract.

  Alternatives:
    - one owner + `tokio::sync::mpsc` / `crossbeam::channel` for push;
    - `ArcSwap<Arc<Vec<…>>>` for read-mostly snapshots;
    - drop the collection (Vec is often used as a mini-channel).

  If the collection is genuinely shared mutable state, document the
  owner and lifecycle in the README of the owning crate.
severity: warning
language: Rust
files:
  - crates/**/src/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
rule:
  any:
    - pattern:
        context: "type _T = Arc<Mutex<Vec<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<Mutex<VecDeque<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<RwLock<Vec<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<RwLock<VecDeque<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::Mutex<Vec<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::Mutex<VecDeque<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::RwLock<Vec<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<parking_lot::RwLock<VecDeque<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::Mutex<Vec<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::Mutex<VecDeque<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::RwLock<Vec<$E>>>;"
        selector: generic_type
    - pattern:
        context: "type _T = Arc<tokio::sync::RwLock<VecDeque<$E>>>;"
        selector: generic_type

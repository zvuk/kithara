id: style.no-local-use-in-prod-functions
message: Move `use` imports to file top; local `use` inside non-test functions is discouraged.
severity: warning
language: Rust
files:
  - crates/**/*.rs
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
rule:
  all:
    - kind: use_declaration
    - inside:
        kind: function_item
        stopBy: end

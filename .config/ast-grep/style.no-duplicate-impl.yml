id: style.no-duplicate-impl
message: "Found multiple inherent impl blocks for `$T` in the same file. Consolidate them or move to another file."
severity: error
language: Rust
ignores:
  - "**/tests/**"
  - "**/test_*.rs"
  - "**/*_test.rs"
  - "**/*_tests.rs"
  - "**/tests.rs"
rule:
  all:
    - pattern: "impl $T { $$$1 }"
    - precedes:
        pattern: "impl $T { $$$2 }"

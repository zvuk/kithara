# Idiom-detector thresholds. Override defaults from
# `xtask/src/idioms/config.rs`. Tightened 2026-05-02: branch_chains and
# guard_cascade limits trimmed to surface more hot-path branch-prediction
# offenders (see plan: Bug #2 hot-path optimization).

# Test-code / build-script exclusion is now shared across all lint namespaces
# via `.config/xtask.toml` [lint_exclude] (paths + automatic #[cfg(test)] AST
# stripping). This file only carries idioms-specific thresholds.

[branch_chains]
# Strongest match-conversion hint — homogeneous chains test the same
# expression with the same operator. Three arms are already a `match`.
homogeneous_arms = 3
# Heterogeneous chains test unrelated predicates. Four arms is enough
# cognitive load to extract predicates or build a tag-enum + match.
heterogeneous_arms = 4
# Catch-all cognitive-load signal regardless of structure.
general_arms = 5
# `if let` chains often have no `match` form — keep them excluded.
count_if_let = false

[guard_cascade]
# Streak of independent early-return guards (`return`/divergent-macro;
# break/continue loop-control and binding-dependency chains are excluded
# by the check). 3 consecutive guards is idiomatic validation / defensive
# flow that the parallel-compute+tuple-match remedy does not improve; the
# decision-table anti-pattern is meaningful at 4+. See module docs.
warn_streak = 4

[derivable_delegation]
enabled = true
trait_min_methods = 2
inherent_min_methods = 2
blocking_impl_attrs = ["async_trait", "uniffi::export", "wasm_bindgen"]
keep_manual_method_attrs = []

[derivable_from]
enabled = true

[derivable_deref]
enabled = true

[derivable_display]
enabled = true

[derivable_getter]
enabled = true
qualified_deref_remaps = [{ field_type = "PathBuf", scoped_name = "Path" }]

[retry_fallback]
# retry_fallback flags retry/fallback vocabulary to catch try-A-else-B chains
# that paper over state bugs. Exact allowed identifiers are legitimate project
# vocabulary and are not useful signals for this lexical check.
allowed_idents = ["attempt", "max_retries"]
# kithara-net retry subsystem legitimately OWNS that vocabulary and is not a
# fallback chain — bounded HTTP backoff on 5xx/429/timeout (RetryPolicy /
# should_retry / RetryExhausted) is degraded-mode network I/O, which AGENTS.md
# explicitly permits as a justified fallback. Other retry/attempt sites are NOT
# exempted here; they stay visible (baseline) so the check keeps surfacing them.
exempt_files = [
  "**/tests/**",
  "**/benches/**",
  "crates/kithara-net/src/error.rs",
  "crates/kithara-net/src/retry.rs",
  "crates/kithara-net/src/types.rs",
]

# Idiom-detector thresholds. Override defaults from
# `xtask/src/idioms/config.rs`. Tightened 2026-05-02: branch_chains and
# guard_cascade limits trimmed to surface more hot-path branch-prediction
# offenders (see plan: Bug #2 hot-path optimization).

# Workspace-relative globs whose violations are dropped from every idioms
# check before baseline-write and ratchet-diff. Idioms target production
# runtime quality; test code, compile-time test-infra crates, and build
# scripts (compile-time, never on a runtime path) are exempt (per project
# policy).
exclude_paths = [
    "**/tests/**",
    "**/tests.rs",
    "**/*_test.rs",
    "**/test_*.rs",
    "crates/kithara-test-utils/**",
    "crates/kithara-test-macros/**",
    "**/build.rs",
]

[branch_chains]
# Strongest match-conversion hint — homogeneous chains test the same
# expression with the same operator. Three arms are already a `match`.
homogeneous_arms = 3
# Heterogeneous chains test unrelated predicates. Four arms is enough
# cognitive load to extract predicates or build a tag-enum + match.
heterogeneous_arms = 4
# Catch-all cognitive-load signal regardless of structure.
general_arms = 5
# `if let` chains often have no `match` form — keep them excluded.
count_if_let = false

[guard_cascade]
# Streak of independent early-return guards (`return`/divergent-macro;
# break/continue loop-control and binding-dependency chains are excluded
# by the check). 3 consecutive guards is idiomatic validation / defensive
# flow that the parallel-compute+tuple-match remedy does not improve; the
# decision-table anti-pattern is meaningful at 4+. See module docs.
warn_streak = 4

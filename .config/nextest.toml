[profile.default]
fail-fast = false
test-threads = "num-cpus"
slow-timeout = { period = "120s", terminate-after = 3 }

# Stress tests that use blocking audio reads (recv_outcome_blocking)
# need exclusive CPU — run one at a time.
[[profile.default.overrides]]
filter = "binary(suite_stress)"
threads-required = "num-cpus"

# Flaky tests: timing-sensitive ABR/seek/ephemeral tests that occasionally
# fail under CPU contention.  One retry is enough to confirm a real failure
# vs a transient scheduling glitch.
[[profile.default.overrides]]
filter = """
  test(drm_stream_byte_integrity) |
  test(stress_chunk_integrity) |
  test(stress_seek_lifecycle) |
  test(live_stress_real_stream) |
  test(stream_continues_after_seek) |
  test(seek_sequence_from_log_real_stream_drm)
"""
retries = 5

[profile.ci]
fail-fast = false
test-threads = "num-cpus"

# Fast-only profile: heavy tests are excluded via -E filter in justfile.
[profile.fast]
fail-fast = false
test-threads = "num-cpus"

# Stress-only profile: run only the heavy test binary.
# No thread limit — a real audio player shares the machine with many
# other processes. Tests must pass under CPU contention.
[profile.stress]
fail-fast = false
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 5 }

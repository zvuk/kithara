# On-disk fixture cache (L2). ON BY DEFAULT: when KITHARA_FIXTURE_CACHE is unset
# (the default profile, `just test`, `cargo test`, `just rtsan`, IDE), the test
# code falls back to a build-fingerprinted temp dir (see
# tests/src/fixture_cache.rs::default_cache_dir), so encode/mux output is reused
# across the per-test processes in a run. Without L2, nextest's process-per-test
# model re-encodes every AAC fixture from scratch — under CPU oversubscription a
# single test's ffmpeg encode can exhaust its whole time budget and time out.
#
# The opt-in `cache` profile below additionally runs a setup script that wipes
# and recreates a shared cache dir and exports KITHARA_FIXTURE_CACHE, giving an
# ephemeral, explicitly-scoped per-run cache instead of the persistent default.
experimental = ["setup-scripts"]

[scripts.setup.fixture-cache]
command = 'cargo run -q -p kithara-integration-tests --bin fixture-cache-setup'

[profile.default]
fail-fast = false
test-threads = "num-cpus"
# Wall-clock BACKSTOP only. The real per-test bound is the macro `timeout(...)`
# on each test — its abort watchdog kills a hung test at its own budget+3s, so
# this backstop only matters for tests with NO per-test timeout. It must sit
# above the slowest *actual* real runtime (NOT above the largest budget): the
# full-suite worst case under contention is ~57s (a flash(false) real-socket
# downswitch test). 120s = ~2x that — well clear of every legit run, while a
# real wedge fails in 120s instead of 300s. A flash deadlock is normally caught
# far sooner by the virtual hang-watchdog (~1s).
slow-timeout = { period = "120s", terminate-after = 1 }
# Default 100ms is too tight when 12 cores run 1800+ tests concurrently;
# munmap of a 46MB test binary + stdout flush can exceed it even for
# sync tests that spawn no threads. A real leak (live worker thread
# blocked on channel) would still exceed 2s and get caught.
leak-timeout = "2s"

[profile.ci]
fail-fast = false
test-threads = "num-cpus"
leak-timeout = "2s"

# Fast-only profile: heavy tests are excluded via -E filter in justfile.
[profile.fast]
fail-fast = false
test-threads = "num-cpus"
leak-timeout = "2s"

# Stress-only profile: run only the heavy test binary.
# No thread limit — a real audio player shares the machine with many
# other processes. Tests must pass under CPU contention.
[profile.stress]
fail-fast = false
test-threads = "num-cpus"
# Wall-clock backstop above the slowest actual runtime (~57s under contention),
# NOT above the per-test budget — the macro `timeout(...)` abort watchdog is the
# real per-test bound. A wedge fails in 120s, not 300s.
slow-timeout = { period = "120s", terminate-after = 1 }
leak-timeout = "2s"

# Opt-in L2 fixture-cache profile: same settings as default, plus the
# setup script that prepares the cache dir and exports KITHARA_FIXTURE_CACHE.
# Use via `cargo nextest run --profile cache` / `just test-cached`.
[profile.cache]
fail-fast = false
test-threads = "num-cpus"
slow-timeout = { period = "120s", terminate-after = 1 }
leak-timeout = "2s"

[[profile.cache.scripts]]
filter = 'package(kithara-integration-tests)'
setup = ['fixture-cache']

# Perf-measurement profile: behavior identical to default (profiles inherit
# it); adds JUnit so `cargo xtask perf` gets exact per-test timings.
[profile.perf.junit]
path = "junit.xml"

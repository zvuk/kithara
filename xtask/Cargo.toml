[package]
name = "xtask"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
clap = { workspace = true }
cargo_metadata = { workspace = true }
anyhow = { workspace = true }
glob = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
toml = { workspace = true }
syn = { workspace = true, features = ["full", "extra-traits", "visit"] }
proc-macro2 = { workspace = true, features = ["span-locations"] }
kithara-workspace-hack = { version = "0.1", path = "../crates/kithara-workspace-hack" }

[dev-dependencies]
tempfile = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["kithara-workspace-hack"]

[lints]
workspace = true

default_install_hook_types:
  - pre-commit

# NOTE: pre-push hook is managed directly via .git/hooks/pre-push
# (not through prek) to avoid output buffering during long test runs.

repos:
  - repo: local
    hooks:
      - id: lint-fast
        name: lint-fast
        entry: just lint-fast
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-commit

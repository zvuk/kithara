default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: lint-fast
        name: lint-fast
        entry: just lint-fast
        language: system
        pass_filenames: false
        stages:
          - pre-commit
      - id: test-all
        name: test-all
        entry: bash -lc 'echo "[prek pre-push] running just test-all"; just test-all'
        language: system
        pass_filenames: false
        verbose: true
        stages:
          - pre-push

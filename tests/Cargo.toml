[package]
name = "kithara-integration-tests"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
publish = false
autotests = false

[lints]
workspace = true

# Cross-platform dependencies (used by both native and WASM tests)
[dependencies]
kithara = { workspace = true, features = ["full", "test-utils", "internal"] }
kithara-audio = { workspace = true, features = ["internal"] }
kithara-assets = { workspace = true }
kithara-bufpool = { workspace = true, features = ["internal"] }
kithara-drm = { workspace = true }
kithara-events = { workspace = true }
kithara-hls = { workspace = true, features = ["internal"] }
kithara-test-utils = { workspace = true }
kithara-net = { workspace = true, features = ["test-utils"] }
kithara-platform = { workspace = true }
kithara-storage = { workspace = true }
kithara-stream = { workspace = true }
kithara-wasm = { workspace = true, features = ["internal"] }

# Async runtime
tokio-util = { workspace = true }

# Channels/buffers
bytes = { workspace = true }

# HTTP/URL
url = { workspace = true }

rodio = { workspace = true }

# Testing framework
serial_test = { workspace = true }
tempfile = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
bincode = { workspace = true }

# Crypto (for HLS encryption tests)
hex = { workspace = true }
aes = { workspace = true }
cbc = { workspace = true }

# Misc
futures = { workspace = true }
uuid = { workspace = true }

# Async traits
async-trait = { workspace = true }

# --- Native-only dependencies ---
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# Additional kithara features (rodio not available on WASM)
kithara = { workspace = true, features = ["rodio"] }
kithara-decode = { workspace = true, features = ["test-utils"] }
kithara-file = { workspace = true }
kithara-play = { workspace = true, features = ["backend-cpal", "internal"] }

# Additional tokio features (full runtime on native)
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true, features = ["full"] }

# HTTP server (axum stack not available on WASM)
reqwest = { workspace = true, features = ["rustls", "stream"] }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# Native audio playback (adds playback feature requiring cpal)
rodio = { workspace = true, features = ["playback"] }

# Mocking
unimock = { workspace = true }

# Storage
mmap-io = { workspace = true }

# WebDriver automation
thirtyfour = { workspace = true }

# Performance monitoring (optional)
hotpath = { workspace = true, optional = true }

# RSS memory profiling
memory-stats = { workspace = true }
assert_no_alloc = { workspace = true }
ringbuf = { workspace = true }
tokio-stream = { workspace = true }

# --- WASM-only dependencies ---
[target.'cfg(target_arch = "wasm32")'.dependencies]
kithara-test-macros = { workspace = true }

# uuid needs js feature on WASM
uuid = { workspace = true, features = ["js"] }

# WASM-specific
js-sys = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
wasm-bindgen-test = { workspace = true }
web-sys = { workspace = true }
gloo-timers = { workspace = true }
tracing-wasm = { workspace = true }
console_error_panic_hook = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { workspace = true }
kithara-abr = { workspace = true, features = ["internal"] }

[features]
perf = [
    "dep:hotpath",
    "hotpath/hotpath",
    "kithara/perf",
]

# HLS fixture server for browser-based WASM tests (native only)
[[bin]]
name = "hls_fixture_server"
path = "bin/hls_fixture_server.rs"
test = false

[[bin]]
name = "fixture_server"
path = "bin/fixture_server.rs"
test = false

[[bin]]
name = "wasm_test_runner"
path = "bin/wasm_test_runner.rs"
test = false

[[test]]
name = "suite_light"
path = "tests/suite_light.rs"

[[test]]
name = "suite_heavy"
path = "tests/suite_heavy.rs"

[[test]]
name = "suite_perf"
path = "perf/suite_perf.rs"
required-features = ["perf"]

[[test]]
name = "memory_rss"
path = "perf/memory_rss.rs"

[[bench]]
name = "refactor_hotpaths"
harness = false

[[bench]]
name = "bufpool"
harness = false

[[bench]]
name = "abr_estimator"
harness = false

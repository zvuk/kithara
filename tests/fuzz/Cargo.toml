[package]
name = "kithara-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = { workspace = true }
arbitrary = { workspace = true }
kithara-drm = { workspace = true }
kithara-assets = { workspace = true }
kithara-file = { workspace = true }
kithara-hls = { workspace = true, features = ["internal"] }
kithara-platform = { workspace = true }
kithara-play = { workspace = true }
kithara-storage = { workspace = true }
kithara-stream = { workspace = true }
hls_m3u8 = { workspace = true }
tokio-util = { workspace = true }
tempfile = { workspace = true }
url = { workspace = true }
kithara-workspace-hack = { version = "0.1", path = "../../crates/kithara-workspace-hack" }

[[bin]]
name = "aes_decrypt"
path = "fuzz_targets/aes_decrypt.rs"
doc = false
test = false
bench = false

[[bin]]
name = "hls_parsing"
path = "fuzz_targets/hls_parsing.rs"
doc = false
test = false
bench = false

[[bin]]
name = "hls_internal_parsing"

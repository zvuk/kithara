stages:
  - lint
  - test
  - quality
  - release

default:
  image: rust:1.88
  tags:
    - cce-feature
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev

cache: &cargo-cache
  key:
    files:
      - Cargo.lock
  paths:
    - .cargo/bin/
    - .cargo/registry/
    - .cargo/git/
    - target/

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

# --- lint stage ---

lint:
  stage: lint
  variables:
    QUALITY_MIN_UNIMOCK_TRAITS: "22"
    QUALITY_MIN_RSTEST_CASES: "485"
    QUALITY_MIN_PERF_TEST_FILES: "5"
    QUALITY_MIN_BENCH_TARGETS: "1"
    QUALITY_MAX_LOCAL_HTTP_SERVERS: "0"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/ast-grep" || cargo install ast-grep --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
    - rustup component add clippy
    - rustup toolchain install nightly --component rustfmt
  script:
    - just lint-full
    - just quality-report-ci
  artifacts:
    paths:
      - target/quality-report.md
      - target/trait-mock-audit.md
      - target/trait-mock-exceptions.md
      - target/rstest-audit.md
    expire_in: 30 days

deny:
  stage: lint
  before_script:
    - test -f "$CARGO_HOME/bin/cargo-deny" || cargo install cargo-deny --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just deny

machete:
  stage: lint
  before_script:
    - test -f "$CARGO_HOME/bin/cargo-machete" || cargo install cargo-machete --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just machete
  allow_failure: true

arch:
  stage: lint
  before_script:
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just arch

# --- test stage ---

test:
  stage: test
  needs: [lint]
  timeout: 20 minutes
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/cargo-nextest" || cargo install cargo-nextest --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just test

msrv:
  stage: test
  needs: [lint]
  image: rust:1.88
  before_script:
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just check

wasm:
  stage: test
  needs: [lint]
  before_script:
    - rustup target add wasm32-unknown-unknown
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just wasm-check

wasm-size:
  stage: test
  needs: [lint]
  before_script:
    - rustup toolchain install nightly --component rust-src
    - rustup target add wasm32-unknown-unknown --toolchain nightly
    - test -f "$CARGO_HOME/bin/wasm-slim" || cargo install --git https://github.com/vitalratel/wasm-slim --rev 437c0accaccf37fe16e75991046076c5c1ee1fa7 wasm-slim --locked
  script:
    - WASM_SLIM_TOOLCHAIN=nightly just wasm-size-check
  artifacts:
    paths:
      - target/wasm-slim-result.json
      - crates/kithara-wasm/.wasm-slim/history.json
    expire_in: 30 days
  allow_failure: true

hack:
  stage: test
  needs: [lint]
  timeout: 30 minutes
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/cargo-hack" || cargo install cargo-hack --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just hack
  allow_failure: true

semver:
  stage: test
  needs: [lint]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/cargo-semver-checks" || cargo install cargo-semver-checks --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just semver
  allow_failure: true
  rules:
    - changes:
        - crates/*/src/**/*
        - crates/*/Cargo.toml

# --- quality stage ---

coverage:
  stage: quality
  needs: [test]
  variables:
    COVERAGE_MIN: "80"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
    - test -f "$CARGO_HOME/bin/cargo-llvm-cov" || cargo install cargo-llvm-cov --locked
    - rustup component add llvm-tools-preview
  script:
    - just coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    expire_in: 30 days

perf:
  stage: quality
  needs: [test]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just perf-test
  artifacts:
    paths:
      - perf-results.txt
    expire_in: 30 days
  rules:
    - changes:
        - crates/**/*
        - tests/perf/**/*
        - Cargo.toml
        - Cargo.lock

bench-baseline:
  stage: quality
  needs: [test]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  cache:
    key: criterion-main-baseline
    paths:
      - target/criterion/
    policy: pull-push
  variables:
    RUN_BENCHMARKS: "1"
    BENCH_CANDIDATE_NAME: "main"
  script:
    - just bench-ci
  artifacts:
    paths:
      - bench-results.txt
      - target/criterion/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
      changes:
        - crates/kithara-abr/**/*
        - tests/benches/**/*
        - justfile
        - Cargo.toml
        - Cargo.lock

bench:
  stage: quality
  needs: [test]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libasound2-dev
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
    - test -f "$CARGO_HOME/bin/critcmp" || cargo install critcmp --locked
  cache:
    key: criterion-main-baseline
    paths:
      - target/criterion/
    policy: pull
  variables:
    RUN_BENCHMARKS: "1"
    BENCH_CANDIDATE_NAME: "ci"
    BENCH_COMPARE_BASELINE_NAME: "main"
  script:
    - just bench-ci
  artifacts:
    paths:
      - bench-results.txt
      - target/criterion/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_REF_NAME != "main"'
      changes:
        - crates/kithara-abr/**/*
        - tests/benches/**/*
        - justfile
        - Cargo.toml
        - Cargo.lock

# --- release stage ---

release-apple:
  stage: release
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
      when: manual
  before_script:
    - test -f "$CARGO_HOME/bin/cargo-swift" || cargo install cargo-swift --locked
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
  script:
    - just release-apple
  artifacts:
    paths:
      - /tmp/KitharaFFIInternal.xcframework.zip
    expire_in: 90 days

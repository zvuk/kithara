stages:
  - docker
  - build
  - lint
  - test
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CI_IMAGE: $CI_REGISTRY_IMAGE/ci:latest
  CI_IMAGE_ANDROID: $CI_REGISTRY_IMAGE/ci-android:latest
  CI_IMAGE_CROSS: $CI_REGISTRY_IMAGE/ci-cross:latest

default:
  image: $CI_IMAGE
  tags:
    - cce-feature
  timeout: 60 minutes

# --- cache templates ---

.cache-pull-push:
  cache:
    - key:
        files:
          - Cargo.lock
      paths:
        - .cargo/registry/index/
        - .cargo/registry/cache/
        - .cargo/git/db/
        - target/
      policy: pull-push
    - key: cargo-tools-v1
      paths:
        - .cargo/bin/
      policy: pull-push

.cache-pull:
  cache:
    - key:
        files:
          - Cargo.lock
      paths:
        - .cargo/registry/index/
        - .cargo/registry/cache/
        - .cargo/git/db/
        - target/
      policy: pull
    - key: cargo-tools-v1
      paths:
        - .cargo/bin/
      policy: pull

# --- mtime normalization for cargo fingerprint cache ---

.touch-sources:
  before_script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - git ls-files | xargs touch -t 202001010000.00

# --- docker stage ---
# Rebuild images only when Dockerfiles or Cargo.lock change.

# TODO: restore rules: after initial images are built
# rules:
#   - changes: [docker/ci.Dockerfile, Cargo.lock]
#   - if: '$FORCE_DOCKER_BUILD == "true"'

docker-ci:
  stage: docker
  image: docker:latest
  tags:
    - cce-feature
  services:
    - docker:dind
  cache: []
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_IMAGE -f docker/ci.Dockerfile .
    - docker push $CI_IMAGE

docker-ci-android:
  stage: docker
  image: docker:latest
  tags:
    - cce-feature
  services:
    - docker:dind
  needs: [docker-ci]
  cache: []
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE -t $CI_IMAGE_ANDROID -f docker/ci-android.Dockerfile .
    - docker push $CI_IMAGE_ANDROID

docker-ci-cross:
  stage: docker
  image: docker:latest
  tags:
    - cce-feature
  services:
    - docker:dind
  needs: [docker-ci]
  cache: []
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE -t $CI_IMAGE_CROSS -f docker/ci-cross.Dockerfile .
    - docker push $CI_IMAGE_CROSS

# --- build stage ---

build:
  stage: build
  cache: !reference [.cache-pull-push, cache]
  before_script:
    - !reference [.touch-sources, before_script]
  script:
    - just test --no-run
    - RUSTUP_TOOLCHAIN=1.89 cargo check --workspace
    - just wasm-check
    - just wasm-size-check || true
  artifacts:
    paths:
      - target/wasm-slim-result.json
      - crates/kithara-wasm/.wasm-slim/history.json
    expire_in: 30 days

# --- lint stage ---

lint:
  stage: lint
  needs: [build]
  cache: !reference [.cache-pull, cache]
  variables:
    QUALITY_MIN_UNIMOCK_TRAITS: "19"
    QUALITY_MIN_RSTEST_CASES: "1"
    QUALITY_MIN_PERF_TEST_FILES: "5"
    QUALITY_MIN_BENCH_TARGETS: "1"
    QUALITY_MAX_LOCAL_HTTP_SERVERS: "0"
  before_script:
    - !reference [.touch-sources, before_script]
    - rustup toolchain install nightly --component rustfmt
  script:
    - just lint-full
    - just quality-report-ci
    - just deny
    - just machete
    - just arch
    - just hack || true
    - just semver || true
  artifacts:
    paths:
      - target/quality-report.md
      - target/trait-mock-audit.md
      - target/trait-mock-exceptions.md
      - target/rstest-audit.md
    expire_in: 30 days

# --- test stage ---

test:
  stage: test
  needs: [lint]
  cache: !reference [.cache-pull, cache]
  variables:
    COVERAGE_MIN: "80"
    RUN_BENCHMARKS: "1"
  before_script:
    - !reference [.touch-sources, before_script]
    - rustup component add llvm-tools-preview
  script:
    - just coverage
    - just perf-test
    - just bench-ci
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    paths:
      - perf-results.txt
      - bench-results.txt
      - target/criterion/
    expire_in: 30 days

# --- release stage ---

release-apple:
  stage: release
  needs: [test]
  tags:
    - macos
  cache:
    - key: cargo-tools-v1
      paths:
        - .cargo/bin/
      policy: pull-push
  before_script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - test -f "$CARGO_HOME/bin/just" || cargo install just --locked
    - test -f "$CARGO_HOME/bin/cargo-swift" || cargo install cargo-swift --locked
  script:
    - just release-apple
    - cp /tmp/KitharaFFIInternal.xcframework.zip .
    # macOS desktop binary
    - cargo build -p kithara-app --release --features tui
    - cp target/release/kithara kithara-macos-$(uname -m)
    - |
      CHECKSUM=$(swift package compute-checksum KitharaFFIInternal.xcframework.zip)
      echo "XCFramework checksum: $CHECKSUM"
  artifacts:
    paths:
      - KitharaFFIInternal.xcframework.zip
      - kithara-macos-*
    expire_in: 30 days

release-android:
  stage: release
  needs: [test]
  image: $CI_IMAGE_ANDROID
  cache: []
  before_script:
    - !reference [.touch-sources, before_script]
  script:
    - just android-aar
  artifacts:
    paths:
      - android/lib/build/outputs/aar/lib-release.aar
    expire_in: 30 days

release-wasm:
  stage: release
  needs: [test]
  cache: !reference [.cache-pull, cache]
  before_script:
    - !reference [.touch-sources, before_script]
    - rustup toolchain install nightly --component rust-src
  script:
    - cargo xtask wasm build --release
  artifacts:
    paths:
      - crates/kithara-wasm/dist/
    expire_in: 30 days

release-desktop:
  stage: release
  needs: [test]
  image: $CI_IMAGE_CROSS
  cache: !reference [.cache-pull, cache]
  before_script:
    - !reference [.touch-sources, before_script]
  script:
    # Linux x86_64
    - cargo build -p kithara-app --release --features tui
    - cp target/release/kithara kithara-linux-x86_64
    # Linux arm64
    - cargo build -p kithara-app --release --features tui --target aarch64-unknown-linux-gnu
    - cp target/aarch64-unknown-linux-gnu/release/kithara kithara-linux-aarch64
    # Windows x86_64
    - cargo xwin build -p kithara-app --release --features tui --target x86_64-pc-windows-msvc
    - cp target/x86_64-pc-windows-msvc/release/kithara.exe kithara-windows-x86_64.exe
  artifacts:
    paths:
      - kithara-linux-x86_64
      - kithara-linux-aarch64
      - kithara-windows-x86_64.exe
    expire_in: 30 days

# Optimise CPU-heavy audio dependencies in debug builds so the audio
# worker thread can keep up with real-time playback.  Without this,
# rubato's sinc interpolation and Symphonia's MP3 decode are ~30×
# slower in debug due to Rust's runtime UB/alignment checks.
[profile.dev.package.rubato]
opt-level = 2
[profile.dev.package.symphonia]
opt-level = 2
[profile.dev.package.symphonia-core]
opt-level = 2
[profile.dev.package.symphonia-bundle-mp3]
opt-level = 2
[profile.dev.package.symphonia-codec-aac]
opt-level = 2
[profile.dev.package.symphonia-bundle-flac]
opt-level = 2
[profile.dev.package.symphonia-format-isomp4]
opt-level = 2
# Playback decode adapters monomorphise Rubato's sinc resampler when enabled,
# and `kithara-decode` drives the per-frame demux/decode loop; both are as
# debug-slow as the upstream codecs above when left at opt-0 (~100s of ms per
# chunk). Harmless under real-time playback (decode overlaps the real download),
# but under `flash` the decode sits on the critical path (the virtual clock
# waits for it), so the debug cost dominates wall-clock and stalls tests.
[profile.dev.package.kithara-audio]
opt-level = 2
[profile.dev.package.kithara-decode]
opt-level = 2
[profile.dev.package.kithara-workspace-hack]
opt-level = 2
# Time-stretch DSP (FFT/phase-vocoder + C++) is ~10× slower in debug.
[profile.dev.package.signalsmith-stretch]
opt-level = 3
# rten float inference is orders of magnitude slower unoptimised.
[profile.dev.package.rten]
opt-level = 3
[profile.dev.package.rten-tensor]
opt-level = 3
[profile.dev.package.rten-gemm]
opt-level = 3
[profile.dev.package.rten-simd]
opt-level = 3
[profile.dev.package.rten-vecmath]
opt-level = 3
[profile.dev.package.rten-base]
opt-level = 3
[profile.dev.package.bungee-sys]
opt-level = 3

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
debug = false
panic = "abort"
strip = "symbols"

# Best-of-both-worlds profile for maximum testing speed.
# Combines release-grade runtime performance (opt-level 3) with fast
# parallel compilation (codegen-units 16, LTO off).
[profile.test-release]
inherits = "release"
opt-level = 3
debug = "line-tables-only"
debug-assertions = true
overflow-checks = true
lto = false
codegen-units = 16
panic = "unwind"
strip = "none"

[profile.wasm-release]
inherits = "release"
opt-level = "z"
lto = "fat"
codegen-units = 1

[patch.crates-io]
firewheel-web-audio = { git = "https://github.com/gerasim13/firewheel-web-audio", rev = "1a5e383af4d5d318f93d6d25e617cc95d7b20aef" }

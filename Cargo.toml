    "crates/kithara-app",
    "crates/kithara-apple",
    "crates/kithara-assets",
    "crates/kithara-audio",
    "crates/kithara-beat",
    "crates/kithara-bufpool",
    "crates/kithara-decode",
    "crates/kithara-devtools",
    "crates/kithara-drm",
    "crates/kithara-encode",
    "crates/kithara-events",
    "crates/kithara-ffi",
    "crates/kithara-file",
    "crates/kithara-hls",
    "crates/kithara-net",
    "crates/kithara-platform",
    "crates/kithara-play",
    "crates/kithara-queue",
    "crates/kithara-resampler",
    "crates/kithara-storage",
    "crates/kithara-stream",
    "crates/kithara-stretch",
    "crates/kithara-test-macros",
    "crates/kithara-test-utils",
    "crates/kithara-workspace-hack",
    "tests",
    "tests/fuzz",
    "xtask",
]
default-members = [
    "crates/kithara",
    "crates/kithara-abr",
    "crates/kithara-apple",
    "crates/kithara-drm",
    "crates/kithara-events",
    "crates/kithara-net",
    "crates/kithara-file",
    "crates/kithara-hls",
    "crates/kithara-audio",
    "crates/kithara-encode",
    "crates/kithara-decode",
    "crates/kithara-stream",
    "crates/kithara-storage",
    "crates/kithara-assets",
    "crates/kithara-bufpool",
    "crates/kithara-platform",
    "crates/kithara-play",
    "crates/kithara-queue",
    "crates/kithara-resampler",
    "crates/kithara-test-utils",
    "crates/kithara-test-macros",
    "tests",
]

[workspace.lints.rust]
unreachable_pub = "warn"
unused_qualifications = "warn"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(rtsan)'] }

[workspace.lints.rustdoc]
broken_intra_doc_links = "deny"

[workspace.lints.clippy]
undocumented_unsafe_blocks = "deny"
unwrap_used = "deny"
allow_attributes = "deny"
needless_range_loop = "deny"
needless_borrow = "deny"
ptr_arg = "deny"
map_identity = "deny"
needless_lifetimes = "deny"
search_is_some = "deny"
manual_map = "deny"
question_mark = "deny"
doc_markdown = "warn"
default_trait_access = "warn"
derivable_impls = "warn"
default_constructed_unit_structs = "warn"
ignored_unit_patterns = "allow"
semicolon_if_nothing_returned = "warn"
missing_fields_in_debug = "warn"
use_self = "warn"
impl_trait_in_params = "warn"
explicit_iter_loop = "warn"
explicit_into_iter_loop = "warn"
redundant_closure_for_method_calls = "warn"
cloned_instead_of_copied = "deny"
flat_map_option = "warn"
manual_let_else = "warn"
inconsistent_struct_constructor = "warn"
map_unwrap_or = "warn"
mut_mut = "warn"
needless_for_each = "warn"
match_wildcard_for_single_variants = "warn"
redundant_else = "warn"
items_after_statements = "warn"
single_match_else = "warn"
match_same_arms = "warn"
needless_pass_by_value = "warn"
trivially_copy_pass_by_ref = "warn"
unused_self = "warn"
unnecessary_wraps = "warn"
option_if_let_else = "warn"
or_fun_call = "warn"
missing_panics_doc = "warn"
missing_errors_doc = "warn"
must_use_candidate = "warn"
cast_lossless = "warn"
cast_possible_truncation = "warn"
cast_sign_loss = "warn"
cast_precision_loss = "warn"
derive_partial_eq_without_eq = "warn"
derived_hash_with_manual_eq = "warn"
partialeq_ne_impl = "warn"
non_canonical_partial_ord_impl = "warn"
derive_ord_xor_partial_ord = "warn"
inherent_to_string = "warn"
to_string_trait_impl = "warn"
significant_drop_tightening = "warn"
cognitive_complexity = "warn"
too_many_lines = "warn"
too_many_arguments = "warn"
type_complexity = "warn"
approx_constant = "warn"

[workspace.metadata.kithara]

[workspace.metadata.kithara.tools]
cargo_sort = ".config/tomlfmt.toml"
clippy = "clippy.toml"
deny = "deny.toml"
rustfmt = "rustfmt.toml"
typos = ".config/typos.toml"

# Drives `cargo xtask apple single` (one self-contained xcframework for the
# CocoaPods / manual drag-in channels). Project-agnostic: point these at a
# different module/bundle to reuse the packaging tooling in another
# UniFFI + Swift workspace — the xtask reads them, nothing is hard-coded.
[workspace.metadata.apple]
framework-name = "Kithara"
bundle-id = "io.zvuk.Kithara"
short-version = "0.0.1"
# iOS 15 floor: consumer apps (e.g. Zvuk) still ship an iOS 15 minimum, and a
# module built for iOS 16 cannot be imported by an iOS 15 target.
deployment-target = "15.0"
autolink-frameworks = ["AudioToolbox", "CoreAudio", "AVFoundation", "Security", "SystemConfiguration"]

[workspace.package]
version = "0.0.1-alpha4"
edition = "2024"
rust-version = "1.89"
authors = ["kithara contributors"]
license = "MIT OR Apache-2.0"
description = "Networking + decoding building blocks for audio playback (not a full player)"
keywords = ["audio", "streaming", "hls", "decoder", "playback"]
categories = ["multimedia::audio"]
repository = "https://github.com/zvuk/kithara"
homepage = "https://github.com/zvuk/kithara"

[workspace.dependencies]
# Backend-bearing crates: default-features disabled at the workspace
# level so apple / android xcframework builds don't transitively pull
# symphonia (decode backend) or reqwest (HTTP backend) through the
# default feature set. Consumers that need the software decode backend
# opt in via `features = ["symphonia"]`; the HTTP backend is selected by
# `client-reqwest` (default) / `client-wreq` (apple/android device) which
# are global toggles on the single kithara-net package, re-forwarded by
# each crate's own `client-reqwest`/`client-wreq`/`tls-*` features. Cargo
# refuses default-features overrides through `workspace = true`
# inheritance, so the disable has to live here on the workspace
# declaration. kithara-events keeps its defaults because it never puts
# an HTTP backend in its own default, so it cannot leak reqwest.
# kithara-test-utils disables defaults at the workspace level so
# framework builds inherit the noop hang/test surface; test/dev edges
# opt back into `hang`.
kithara = { path = "crates/kithara", version = "0.0.1-alpha4", default-features = false }
kithara-abr = { path = "crates/kithara-abr", version = "0.0.1-alpha4", default-features = false }
kithara-app = { path = "crates/kithara-app", default-features = false }
kithara-apple = { path = "crates/kithara-apple", version = "0.0.1-alpha4" }
kithara-assets = { path = "crates/kithara-assets", version = "0.0.1-alpha4", default-features = false }
kithara-audio = { path = "crates/kithara-audio", version = "0.0.1-alpha4", default-features = false }
kithara-beat = { path = "crates/kithara-beat", version = "0.0.1-alpha4" }
kithara-bufpool = { path = "crates/kithara-bufpool", version = "0.0.1-alpha4" }
kithara-decode = { path = "crates/kithara-decode", version = "0.0.1-alpha4", default-features = false }
kithara-devtools = { path = "crates/kithara-devtools", version = "0.0.1-alpha4" }
kithara-drm = { path = "crates/kithara-drm", version = "0.0.1-alpha4" }
kithara-encode = { path = "crates/kithara-encode", version = "0.0.1-alpha4" }
kithara-events = { path = "crates/kithara-events", version = "0.0.1-alpha4" }
kithara-ffi = { path = "crates/kithara-ffi" }
kithara-file = { path = "crates/kithara-file", version = "0.0.1-alpha4", default-features = false }
kithara-hls = { path = "crates/kithara-hls", version = "0.0.1-alpha4", default-features = false }
kithara-net = { path = "crates/kithara-net", version = "0.0.1-alpha4", default-features = false }
kithara-platform = { path = "crates/kithara-platform", version = "0.0.1-alpha4" }
kithara-play = { path = "crates/kithara-play", version = "0.0.1-alpha4", default-features = false }
kithara-queue = { path = "crates/kithara-queue", version = "0.0.1-alpha4", default-features = false }
kithara-resampler = { path = "crates/kithara-resampler", version = "0.0.1-alpha4", default-features = false }
kithara-storage = { path = "crates/kithara-storage", version = "0.0.1-alpha4", default-features = false }
kithara-stream = { path = "crates/kithara-stream", version = "0.0.1-alpha4", default-features = false }
kithara-stretch = { path = "crates/kithara-stretch", version = "0.0.1-alpha4", default-features = false }
kithara-test-macros = { path = "crates/kithara-test-macros", version = "0.0.1-alpha4" }
kithara-test-utils = { path = "crates/kithara-test-utils", version = "0.0.1-alpha4", default-features = false }
kithara-workspace-hack = { path = "crates/kithara-workspace-hack", version = "0.0.1-alpha4" }


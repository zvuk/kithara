id: arch.no-raw-tokio-task
message: |
  Direct use of a raw `tokio` task primitive. Route through
  `kithara_platform::tokio::task` so the quiescence engine accounts every task
  under `sim-time`:
  - `tokio::spawn` / `tokio::task::spawn` → `kithara_platform::tokio::task::spawn`
  - `tokio::task::spawn_blocking`         → `kithara_platform::tokio::task::spawn_blocking`
  - `tokio::task::yield_now`              → `kithara_platform::tokio::task::yield_now`

  `spawn` wraps the future in the quiescence poll-wrapper (a raw spawn runs
  UNCOUNTED and lets the virtual clock race past it). `spawn_blocking` brackets
  the closure with the real-I/O pacing guard. `yield_now` must relinquish the
  virtual clock (a raw yield self-wakes and pins the clock — a livelock).

      // ❌  tokio::spawn(fut);            tokio::task::yield_now().await;
      // ✅  use kithara_platform::tokio::task;  task::spawn(fut);  task::yield_now().await;

  A `handle.spawn(fut)` on a specific runtime `Handle` must wrap the future in
  `kithara_platform::time::participate(fut)`.

  This is an ERROR gate covering ALL workspace Rust — production AND tests.

  Suppress with `// ast-grep-ignore: arch.no-raw-tokio-task` ONLY at a marked
  bridge that intentionally runs outside the engine (document why on the line).
severity: error
language: Rust
files:
  - crates/**/*.rs
  - tests/**/*.rs
ignores:
  # The platform crate OWNS the task primitives (binds them to the engine).
  - crates/kithara-platform/**
rule:
  any:
    # Imports where `tokio` is the CRATE ROOT (`use tokio::...`), never the
    # platform alias `use kithara_platform::tokio::...`.
    - kind: use_declaration
      regex: '\buse\s+tokio::task::(spawn|spawn_blocking|yield_now)\b'
    - kind: use_declaration
      regex: '\buse\s+tokio::\{[\s\S]*\btask::(spawn|spawn_blocking|yield_now)\b'
    # Qualified call sites (root-crate `tokio::`, structural full-path match).
    - pattern: tokio::spawn($$$REST)
    - pattern: tokio::task::spawn($$$REST)
    - pattern: tokio::task::spawn_blocking($$$REST)
    - pattern: tokio::task::yield_now($$$REST)

id: rust.no-thin-sync-wrapper
message: Thin sync wrappers with a single call are discouraged.
severity: warning
language: Rust
files:
  - crates/**/src/**/*.rs
rule:
  all:
    - kind: function_item
    - regex: '(?ms)^\s*fn\s+\w+\s*\([^)]*\)\s*(?:->\s*[^\{]+)?\{\s*[A-Za-z0-9_:.]+\([^\n\)]*\);?\s*\}$'

name: KitharaDemo
options:
  bundleIdPrefix: com.kithara
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "16.0"

packages:
  Kithara:
    path: ../../../

targets:
  KitharaDemo:
    type: application
    platform: [iOS, macOS]
    sources:
      - Sources
      - path: ../../../.env
        buildPhase: resources
        optional: true
    dependencies:
      - package: Kithara
        product: Kithara
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kithara.demo
        SWIFT_VERSION: "6.0"
  KitharaDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: KitharaDemo_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kithara.demo.uitests
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: KitharaDemo_iOS
        GENERATE_INFOPLIST_FILE: YES

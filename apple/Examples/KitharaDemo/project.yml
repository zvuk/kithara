name: KitharaDemo
options:
  bundleIdPrefix: com.kithara
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "16.0"

packages:
  Kithara:
    url: https://github.com/zvuk/kithara
    from: "0.0.1"

targets:
  KitharaDemo:
    type: application
    platform: [iOS, macOS]
    sources:
      - Sources
    dependencies:
      - package: Kithara
        product: Kithara
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kithara.demo
        SWIFT_VERSION: "6.0"
